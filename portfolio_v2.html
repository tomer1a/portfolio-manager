<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול תיק השקעות - Dark Mode</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gray: {
                            850: '#1f2937',
                            900: '#111827',
                            950: '#030712',
                        },
                        portfolio: '#3b82f6', // Blue
                        sp500: '#eab308',     // Yellow
                    }
                }
            }
        }
    </script>

    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/react-is@18/umd/react-is.production.min.js"></script>

    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Recharts -->
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.3/umd/Recharts.js"></script>

    <!-- SheetJS for Excel import -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>

    <!-- Application CSS (extracted) -->
    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="antialiased min-h-screen">
    <div id="root">
        <div style="padding: 3rem; text-align: center; color: #9ca3af; font-family: sans-serif; direction: rtl;">
            <h2 style="color: white; margin-bottom: 1rem;">טוען את המערכת...</h2>
            <p>מתחבר למסד הנתונים בענן ומכין את התיק האישי שלך</p>
        </div>
    </div>


    <!-- ============================================================= -->
    <!-- Application JavaScript — Pure logic (no JSX)                  -->
    <!-- Loaded as regular scripts so they work with file:// protocol  -->
    <!-- ============================================================= -->
    <script src="js/config.js?v=2"></script>
    <script src="js/utils.js?v=2"></script>
    <script src="js/chartBuilder.js?v=2"></script>
    <script src="js/calculations.js?v=2"></script>
    <script src="js/excelImport.js?v=2"></script>
    <script src="js/crypto.js?v=2"></script>
    <script src="js/api.js?v=2"></script>
    <script src="js/handlers.js?v=2"></script>
    <script src="js/icons.js?v=2"></script>
    <script src="js/loginScreen.js?v=2"></script>
    <script src="js/renderPanels.js?v=2"></script>
    <script src="js/renderTable.js?v=2"></script>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(function (err) {
                console.warn('SW registration failed:', err);
            });
        }
    </script>

    <script type="text/babel">
        // =====================================================================
        // Library Availability Check
        // =====================================================================
        if (typeof React === 'undefined' || typeof window.Recharts === 'undefined') {
            document.getElementById('root').innerHTML = '<div style="padding: 3rem; text-align: center; color: #f87171; font-family: sans-serif; direction: rtl;"><h2>Connection Error!</h2><p>Libraries failed to load from the internet.</p></div>';
            throw new Error("Libraries failed to load.");
        }

        const { useState, useEffect, useMemo } = React;
        const { ResponsiveContainer, LineChart, Line, AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip, ReferenceLine, Dot, PieChart, Pie, Cell, Legend } = window.Recharts;

        // Icon & LoginScreen components loaded from js/icons.js and js/loginScreen.js
        const { IconTrendingUp, IconTrendingDown, IconSettings, IconTrash, IconEdit, IconRefresh, IconEyeOpen, IconEyeClosed, IconUser, IconSignOut, LoginScreen } = window;

        // References to external utility functions (from js/*.js files)
        const { getPositionStats, getJaggedNoise, normalizeSymbol, firebaseConfig, initialPositions } = window;

        // --- Main App Component ---
        const App = () => {
            // State
            const [currency, setCurrency] = useState('USD');
            const [exchangeRate, setExchangeRate] = useState(3.65);
            const [apiKey, setApiKey] = useState('');
            const [tempApiKey, setTempApiKey] = useState('');
            const [showSettings, setShowSettings] = useState(false);
            const [apiError, setApiError] = useState('');

            // Portfolio State
            const [cash, setCash] = useState(5000);
            const [cashRate, setCashRate] = useState(null);
            const [positions, setPositions] = useState([]);
            const [initialInvestment, setInitialInvestment] = useState(null);
            const [investmentRate, setInvestmentRate] = useState(null);
            const [spyData, setSpyData] = useState(null);

            // UI States
            const [isEditingCash, setIsEditingCash] = useState(false);
            const [tempCash, setTempCash] = useState('5000');
            const [tempCashRate, setTempCashRate] = useState('');

            const [isAddingCash, setIsAddingCash] = useState(false);
            const [tempAddCash, setTempAddCash] = useState('');
            const [tempAddCashRate, setTempAddCashRate] = useState('');
            const [tempAddCashDate, setTempAddCashDate] = useState('');

            const [isEditingInv, setIsEditingInv] = useState(false);
            const [tempInv, setTempInv] = useState('');
            const [tempInvRate, setTempInvRate] = useState('');

            const [isAddingInv, setIsAddingInv] = useState(false);
            const [tempAddInv, setTempAddInv] = useState('');
            const [tempAddInvRate, setTempAddInvRate] = useState('');
            const [tempAddInvDate, setTempAddInvDate] = useState('');

            const [editingStockId, setEditingStockId] = useState(null);
            const [editStockData, setEditStockData] = useState({ shares: '', price: '' });
            const [loading, setLoading] = useState(true);
            const [historicalFX, setHistoricalFX] = useState(null);
            const [newSymbol, setNewSymbol] = useState('');
            const [newShares, setNewShares] = useState('');
            const [newPrice, setNewPrice] = useState('');
            const [newDate, setNewDate] = useState('');
            const [newCommission, setNewCommission] = useState('');

            // Multi-transaction & dividend states
            const [expandedCash, setExpandedCash] = useState(false);
            const [expandedStocks, setExpandedStocks] = useState({});
            const [dividendForm, setDividendForm] = useState(null); // symbol being edited
            const [tempDivAmount, setTempDivAmount] = useState('');
            const [tempDivDate, setTempDivDate] = useState('');
            const [snapshots, setSnapshots] = useState([]);
            const [chartRange, setChartRange] = useState('ALL');
            const [chartView, setChartView] = useState('performance'); // 'performance' or 'allocation'
            const [cashDeposits, setCashDeposits] = useState([]);

            // Import from anonymous user
            const [importUid, setImportUid] = useState('');
            const [importStatus, setImportStatus] = useState(null); // { ok, message }
            const [importLoading, setImportLoading] = useState(false);
            const [importConfirm, setImportConfirm] = useState(false);

            // Firebase Cloud States
            const [user, setUser] = useState(null);
            const [authReady, setAuthReady] = useState(false);
            const [dbInstance, setDbInstance] = useState(null);
            const [dbReady, setDbReady] = useState(false);
            const [cloudError, setCloudError] = useState('');
            const [refreshTrigger, setRefreshTrigger] = useState(0);

            // Version counter — bumped whenever window.spyHistoricalData is refreshed from Firebase
            const [spDataVersion, setSpDataVersion] = useState(0);
            // Version counter — bumped when per-stock historical prices are loaded
            const [stockHistoryVersion, setStockHistoryVersion] = useState(0);

            // Mobile detection
            const [isMobile, setIsMobile] = useState(window.innerWidth < 768);
            const [showMobileMenu, setShowMobileMenu] = useState(false);
            useEffect(() => {
                const handleResize = () => setIsMobile(window.innerWidth < 768);
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            // Toggle for S&P 500 Comparison
            const [showSp500, setShowSp500] = useState(true);
            const [showTaxSection, setShowTaxSection] = useState(false);
            const [showValues, setShowValues] = useState(false);
            const [lastManualUpdate, setLastManualUpdate] = useState(null);

            // Sorting state for positions table
            const [sortColumn, setSortColumn] = useState('weight'); // default: sort by weight (biggest first)
            const [sortDirection, setSortDirection] = useState('desc');

            const handleSort = (column) => {
                if (sortColumn === column) {
                    setSortDirection(prev => prev === 'asc' ? 'desc' : 'asc');
                } else {
                    setSortColumn(column);
                    setSortDirection('desc');
                }
            };

            const getSortArrow = (column) => {
                if (sortColumn !== column) return '⇅';
                return sortDirection === 'asc' ? '▲' : '▼';
            };

            // 1. Initialize Firebase (delegates to api.js)
            useEffect(() => {
                window.initFirebaseAuth({
                    firebaseConfig, setDbInstance, setUser, setAuthReady, setCloudError,
                    setPositions, setDbReady, initialPositions
                });
            }, []);

            // 2. Load cloud data (delegates to api.js)
            useEffect(() => {
                const unsub = window.setupCloudListener({
                    user, dbInstance, normalizeSymbol, setPositions, setCash,
                    setCashRate, setInitialInvestment, setInvestmentRate,
                    setCashDeposits, setApiKey, setTempApiKey,
                    setCloudError, setDbReady, initialPositions, setLastManualUpdate
                });
                return () => unsub();
            }, [user, dbInstance]);

            // SaveToDb wrapper — delegates to api.js
            const saveToDb = (newPositions, newCash, newApiKey, newInitInv, newCashRate, newInvRate, newDeposits, { manualUpdate = true } = {}) => {
                window.savePortfolioToDb(
                    { positions, cash, apiKey, initialInvestment, cashRate, investmentRate, cashDeposits, lastManualUpdate,
                      user, dbInstance, setPositions, setCash, setApiKey, setInitialInvestment,
                      setCashRate, setInvestmentRate, setCashDeposits, setLastManualUpdate },
                    { newPositions, newCash, newApiKey, newInitInv, newCashRate, newInvRate, newDeposits, manualUpdate }
                );
            };

            // 3. Fetch exchange rates (delegates to api.js)
            useEffect(() => {
                window.fetchExchangeRates({ setExchangeRate, setHistoricalFX, setLoading });
            }, []);

            // 4. Fetch realtime stock prices (delegates to api.js)
            useEffect(() => {
                if (dbReady && apiKey) {
                    window.fetchRealtimePrices({
                        positions, apiKey, user, dbInstance, setLoading, setApiError,
                        setSpyData, saveToDb, getPositionStats
                    });
                }
            }, [apiKey, dbReady, refreshTrigger]);

            // 5. Load S&P 500 weekly data from Firebase (global, shared across all users).
            //    Seeds Firebase on first run; refreshes from Finnhub when data is > 7 days old.
            useEffect(() => {
                if (dbReady && user && dbInstance) {
                    window.loadSp500WeeklyData({ dbInstance, user, apiKey, setSpDataVersion });
                }
            }, [dbReady, user, dbInstance, apiKey]);

            // 6. Fetch per-stock historical prices from Yahoo Finance (cached in Firebase)
            useEffect(() => {
                if (dbReady && user && dbInstance && positions && positions.length > 0) {
                    window.fetchStockHistoryForPositions({
                        positions, dbInstance, user, setStockHistoryVersion
                    });
                }
            }, [dbReady, user, dbInstance, positions]);

            // FX History helper
            const getRateAtDate = (dateStr, currentRate) => {
                if (!historicalFX || Object.keys(historicalFX).length === 0) return currentRate;
                const d = new Date(dateStr);
                if (isNaN(d.getTime())) return currentRate;
                const today = new Date();
                if (d.toDateString() === today.toDateString() || d > today) return currentRate;

                // Use local timezone for date key (toISOString uses UTC, which shifts dates
                // by 1 day in Israel timezone and breaks lookups against Frankfurter API data)
                const toLocalDateKey = (dt) => {
                    const y = dt.getFullYear();
                    const m = String(dt.getMonth() + 1).padStart(2, '0');
                    const dd = String(dt.getDate()).padStart(2, '0');
                    return `${y}-${m}-${dd}`;
                };

                let searchDate = new Date(d);
                for (let i = 0; i < 10; i++) {
                    const dateKey = toLocalDateKey(searchDate);
                    if (historicalFX[dateKey]) return historicalFX[dateKey];
                    searchDate.setDate(searchDate.getDate() - 1);
                }
                return currentRate;
            };

            // Chart Data — delegates to chartBuilder.js
            const chartData = useMemo(() => {
                if (!dbReady || !positions || positions.length === 0) return [];
                return window.buildChartData({
                    positions, cash, cashRate, exchangeRate,
                    initialInvestment, investmentRate, spyData,
                    cashDeposits, historicalFX, getRateAtDate,
                    getPositionStats, getJaggedNoise
                });
            }, [positions, cash, exchangeRate, cashRate, historicalFX, dbReady, initialInvestment, investmentRate, currency, spyData, cashDeposits, spDataVersion, stockHistoryVersion]);

            // Calculations
            const formatMoney = (amount) => {
                if (!showValues) return '•••••';
                const symbol = currency === 'ILS' ? '₪' : '$';
                return `${symbol}${amount.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 })}`;
            };

            const formatPercent = (value, decimals = 2) => {
                return `${value >= 0 ? '+' : ''}${value.toFixed(decimals)}%`;
            };

            // Portfolio Calculations — delegates to calculations.js
            const calculateTotals = () => window.calculateTotals({
                positions, cash, cashRate, exchangeRate,
                initialInvestment, investmentRate, currency, getRateAtDate
            });

            const calculateTaxSummary = () => window.calculateTaxSummary({
                positions, exchangeRate, currency, getRateAtDate
            });


            const totals = calculateTotals();
            const { val: portfolioCurrentDisplay, profit: portfolioProfitDisplay, profitPercent: portfolioProfitPercentDisplay, dynCost, dynCostUSD, dailyProfit: portfolioDailyProfit, dailyProfitPercent: portfolioDailyProfitPercent, totalDividends: portfolioTotalDividends } = totals;

            // Derive YTD profit from chart data for accuracy.
            // The chart tracks the real portfolio composition at each point,
            // so this matches the chart badge when set to YTD.
            const ytdFromChart = useMemo(() => {
                if (chartData.length === 0) return { profit: 0, percent: 0 };
                const yearStart = new Date(new Date().getFullYear(), 0, 1).getTime();
                const portKey = currency === 'ILS' ? 'portfolioPercentILS' : 'portfolioPercentUSD';
                const valKey = currency === 'ILS' ? 'absoluteValILS' : 'absoluteValUSD';
                // Find the chart point closest to Jan 1st
                let ytdPoint = null;
                for (let i = 0; i < chartData.length; i++) {
                    if (chartData[i].timestamp >= yearStart) { ytdPoint = chartData[i]; break; }
                }
                if (!ytdPoint) ytdPoint = chartData[0];
                const lastPoint = chartData[chartData.length - 1];
                // Rebase: same formula as the chart badge (lines 776)
                const basePercent = ytdPoint[portKey];
                const lastPercent = lastPoint[portKey];
                const rebasedPercent = (((1 + (lastPercent / 100)) / (1 + (basePercent / 100))) - 1) * 100;
                // Compute dollar profit from absolute values
                const ytdStartVal = ytdPoint[valKey];
                const currentVal = lastPoint[valKey];
                const profit = currentVal - ytdStartVal;
                return { profit, percent: rebasedPercent };
            }, [chartData, currency]);

            const portfolioYtdProfit = chartData.length > 0 ? ytdFromChart.profit : totals.ytdProfit;
            const portfolioYtdProfitPercent = chartData.length > 0 ? ytdFromChart.percent : totals.ytdProfitPercent;

            // S&P 500 Calculations for the Summary Card
            const sp500PercentDisplay = chartData.length > 0 ? (currency === 'ILS' ? chartData[chartData.length - 1].sp500PercentILS : chartData[chartData.length - 1].sp500PercentUSD) : 0;

            // Get the actual S&P 500 index value from chart data (currency-aware)
            const currentSp500Index = chartData.length > 0 ? (currency === 'ILS' ? chartData[chartData.length - 1].sp500IndexValueILS : chartData[chartData.length - 1].sp500IndexValue) : null;

            // Form Handlers — delegates to handlers.js
            const handleAddPosition = (e) => window.handleAddPositionLogic(e, {
                newSymbol, newShares, newPrice, newDate, newCommission, currency, exchangeRate,
                positions, cash, cashRate, apiKey, getRateAtDate, normalizeSymbol,
                getPositionStats, saveToDb, setNewSymbol, setNewShares, setNewPrice, setNewDate, setNewCommission
            });

            const removePosition = (id) => window.removePositionLogic(id, {
                positions, cash, cashRate, exchangeRate, getRateAtDate, saveToDb
            });

            const removeTransaction = (posId, txnId) => window.removeTransactionLogic(posId, txnId, {
                positions, cash, cashRate, exchangeRate, getRateAtDate, saveToDb
            });

            const startEditingStock = (pos) => {
                const stats = getPositionStats(pos);
                const rateAtPurchase = currency === 'ILS' ? getRateAtDate(stats.earliestDate, exchangeRate) : 1;
                setEditingStockId(pos.id);
                setEditStockData({ shares: stats.totalShares.toString(), price: (stats.avgPrice * rateAtPurchase).toFixed(2) });
            };

            const saveStockEdit = (id, originalDate) => window.saveStockEditLogic(id, originalDate, {
                currency, exchangeRate, editStockData, positions, getRateAtDate, saveToDb, setEditingStockId
            });

            const handleAddDividend = (posId) => window.handleAddDividendLogic(posId, {
                tempDivAmount, tempDivDate, positions, cash, cashRate, exchangeRate, currency,
                getRateAtDate, getPositionStats, saveToDb, setDividendForm, setTempDivAmount, setTempDivDate
            });

            const removeDividend = (posId, divId) => window.removeDividendLogic(posId, divId, {
                positions, cash, cashRate, exchangeRate, saveToDb
            });

            const cancelStockEdit = () => setEditingStockId(null);

            // Excel Import (delegates to excelImport.js)
            const handleExcelImport = async (e) => {
                const file = e.target.files[0]; if (!file) return; e.target.value = '';
                try {
                    const result = await window.parseExcelFile(file, apiKey, normalizeSymbol);
                    if (!result) return;
                    const newCash = result.finalCash !== null ? result.finalCash : cash;
                    await saveToDb(result.newPositions, newCash, undefined, result.totalDeposits > 0 ? result.totalDeposits : undefined, undefined, undefined, result.depositEvents);
                    alert(result.summary); window.location.reload();
                } catch (err) { console.error('Excel import error:', err); alert('Import error: ' + err.message); }
            };

            const handleAddCashSubmit = () => window.handleAddCashLogic({
                tempAddCash, tempAddCashRate, tempAddCashDate, cash, cashRate, exchangeRate,
                cashDeposits, getRateAtDate, saveToDb, setIsAddingCash
            });

            const removeCashDeposit = (depositId) => window.removeCashDepositLogic({
                cashDeposits, cash, initialInvestment, exchangeRate, saveToDb
            }, depositId);

            const handleAddInvSubmit = () => window.handleAddInvLogic({
                tempAddInv, tempAddInvRate, tempAddInvDate, cash, cashRate, exchangeRate,
                initialInvestment, investmentRate, positions, getRateAtDate, saveToDb, setIsAddingInv
            });


            // Custom Tooltip for Chart
            const CustomTooltip = ({ active, payload, label }) => {
                if (active && payload && payload.length) {
                    const portPoint = payload.find(p => p.dataKey === 'portfolioPercentUSD' || p.dataKey === 'portfolioPercentILS');
                    const spPoint = payload.find(p => p.dataKey === 'sp500PercentUSD' || p.dataKey === 'sp500PercentILS');

                    const absValue = currency === 'ILS' ? portPoint?.payload?.absoluteValILS : portPoint?.payload?.absoluteValUSD;
                    const displayValue = formatMoney(absValue || 0);
                    const portVal = portPoint?.value || 0;
                    const spVal = spPoint?.value || 0;
                    const diff = portVal - spVal;
                    const isOutperforming = diff >= 0;

                    // Get actual S&P 500 index value for this data point (currency-aware)
                    let sp500AbsDisplay = '';
                    const sp500Idx = currency === 'ILS' ? portPoint?.payload?.sp500IndexValueILS : portPoint?.payload?.sp500IndexValue;
                    if (sp500Idx) {
                        const sp500Symbol = currency === 'ILS' ? '₪' : '';
                        sp500AbsDisplay = sp500Symbol + sp500Idx.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
                    }

                    return (
                        <div className="chart-tooltip p-4 rounded-xl min-w-[240px]" style={{ borderRadius: '14px' }}>
                            {/* Date header */}
                            <div className="flex items-center gap-2 mb-3 pb-2" style={{ borderBottom: '1px solid rgba(75, 85, 99, 0.3)' }}>
                                <span style={{ fontSize: '11px', color: '#9ca3af', letterSpacing: '0.05em', textTransform: 'uppercase', fontWeight: 600 }}>📅</span>
                                <span style={{ fontSize: '13px', color: '#d1d5db', fontWeight: 600, letterSpacing: '0.02em' }} dir="ltr">{label}</span>
                            </div>

                            <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
                                {/* Portfolio row */}
                                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: '16px' }} dir="ltr">
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                                        <div style={{ width: '10px', height: '10px', borderRadius: '50%', background: portVal >= 0 ? '#22c55e' : '#ef4444', boxShadow: portVal >= 0 ? '0 0 8px rgba(34,197,94,0.5)' : '0 0 8px rgba(239,68,68,0.5)' }}></div>
                                        <span style={{ color: '#e5e7eb', fontWeight: 500, fontSize: '13px' }}>תיק השקעות</span>
                                    </div>
                                    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end' }}>
                                        <span style={{ fontWeight: 700, fontSize: '14px', color: portVal >= 0 ? '#4ade80' : '#f87171' }}>
                                            {portVal > 0 ? '+' : ''}{portVal.toFixed(2)}%
                                        </span>
                                        <span style={{ fontSize: '11px', color: '#9ca3af', fontWeight: 500 }}>{displayValue}</span>
                                    </div>
                                </div>

                                {/* S&P 500 row */}
                                {showSp500 && (
                                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: '16px' }} dir="ltr">
                                        <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                                            <div style={{ width: '10px', height: '10px', borderRadius: '50%', background: '#eab308', boxShadow: '0 0 8px rgba(234,179,8,0.4)' }}></div>
                                            <span style={{ color: '#e5e7eb', fontWeight: 500, fontSize: '13px' }}>S&P 500</span>
                                        </div>
                                        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end' }}>
                                            <span style={{ fontWeight: 700, fontSize: '14px', color: '#facc15' }}>
                                                {spVal > 0 ? '+' : ''}{spVal.toFixed(2)}%
                                            </span>
                                            {sp500AbsDisplay && <span style={{ fontSize: '11px', color: '#9ca3af', fontWeight: 500 }}>{sp500AbsDisplay}</span>}
                                        </div>
                                    </div>
                                )}

                                {/* Difference row - only when S&P is visible */}
                                {showSp500 && (
                                    <div style={{ marginTop: '4px', paddingTop: '8px', borderTop: '1px solid rgba(75, 85, 99, 0.3)', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }} dir="ltr">
                                        <span style={{ fontSize: '11px', color: '#9ca3af', fontWeight: 500 }}>{isOutperforming ? '🏆' : '📉'} הפרש ביצועים</span>
                                        <span style={{ fontWeight: 700, fontSize: '13px', color: isOutperforming ? '#4ade80' : '#f87171', background: isOutperforming ? 'rgba(34,197,94,0.1)' : 'rgba(239,68,68,0.1)', padding: '2px 8px', borderRadius: '6px' }}>
                                            {diff > 0 ? '+' : ''}{diff.toFixed(2)}%
                                        </span>
                                    </div>
                                )}
                            </div>
                        </div>
                    );
                }
                return null;
            };

            // Shared context object for extracted render functions
            const ctx = {
                currency, exchangeRate, setExchangeRate, apiKey, tempApiKey, setTempApiKey,
                apiError, showSettings, setShowSettings, positions, cash, cashRate, setCashRate,

                            'YTD': now - new Date(new Date().getFullYear(), 0, 1).getTime(),
                            '1Y': 365 * 24 * 60 * 60 * 1000,
                            'ALL': Infinity
                        };
                        const cutoff = chartRange === 'ALL' ? 0 : now - rangeMs[chartRange];
                        const rawFiltered = chartData.filter(d => d.timestamp >= cutoff);
                        const portKey = currency === 'ILS' ? 'portfolioPercentILS' : 'portfolioPercentUSD';
                        const spKey = currency === 'ILS' ? 'sp500PercentILS' : 'sp500PercentUSD';

                        const filteredData = rawFiltered.map(d => ({

                            [portKey]: parseFloat(rebase(d[portKey], basePort).toFixed(2)),

                                }
                            }

                            ...d,

                        }));

                                        <span style={{ fontSize: '8px' }}>●</span>

                                            <feFlood floodColor="#ef4444" floodOpacity="0.4" />

                                            <feFlood floodColor="#eab308" floodOpacity="0.3" />

                                                <feMergeNode in="SourceGraphic" />

                                    </defs>
                                    <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="rgba(55, 65, 81, 0.5)" />

                                                <td className="px-2 py-2 text-xs text-gray-500">-</td>
                                                <td className="px-2 py-2 text-xs text-gray-500">-</td>
                                                <td className="px-2 py-2 text-center">
                                                    {cashDeposits.length > 1 && (
                                                        <button onClick={() => removeCashDeposit(dep.id)} className="text-xs text-gray-500 hover:text-red-400" title="מחק הפקדה">✕</button>
                                                    )}
                                                </td>
                                            </tr>
                                        );
                                    })}

                                    {/* Position rows + Totals (from js/renderTable.js) */}
                                    {positions.filter(pos => getPositionStats(pos).totalShares > 0).slice().sort((a, b) => {
                                        const statsA = getPositionStats(a);
                                        const statsB = getPositionStats(b);
                                        const rateAtPurchaseA = currency === 'ILS' ? getRateAtDate(statsA.earliestDate, exchangeRate) : 1;
                                        const rateAtPurchaseB = currency === 'ILS' ? getRateAtDate(statsB.earliestDate, exchangeRate) : 1;
                                        const rateNow = currency === 'ILS' ? exchangeRate : 1;
                                        const valueA = statsA.totalShares * a.currentPrice * rateNow;
                                        const valueB = statsB.totalShares * b.currentPrice * rateNow;
                                        let cmp = 0;
                                        switch (sortColumn) {
                                            case 'symbol': cmp = a.symbol.localeCompare(b.symbol); break;
                                            case 'date': cmp = (statsA.earliestDate || '').localeCompare(statsB.earliestDate || ''); break;
                                            case 'shares': cmp = statsA.totalShares - statsB.totalShares; break;
                                            case 'purchasePrice': cmp = (statsA.avgPrice * rateAtPurchaseA) - (statsB.avgPrice * rateAtPurchaseB); break;
                                            case 'currentPrice': cmp = (a.currentPrice * rateNow) - (b.currentPrice * rateNow); break;
                                            case 'dailyChange': cmp = ((a.dailyChangePercent || 0)) - ((b.dailyChangePercent || 0)); break;
                                            case 'ytd': {
                                                const ytdA = a.ytdPrice > 0 ? ((a.currentPrice - a.ytdPrice) / a.ytdPrice) * 100 : 0;
                                                const ytdB = b.ytdPrice > 0 ? ((b.currentPrice - b.ytdPrice) / b.ytdPrice) * 100 : 0;
                                                cmp = ytdA - ytdB; break;
                                            }
                                            case 'dividends': cmp = (statsA.totalDividends * rateNow) - (statsB.totalDividends * rateNow); break;
                                            case 'value': cmp = valueA - valueB; break;
                                            case 'weight': cmp = valueA - valueB; break; // weight is proportional to value
                                            case 'profit': {
                                                const profitA = valueA - (statsA.totalCost * rateAtPurchaseA);
                                                const profitB = valueB - (statsB.totalCost * rateAtPurchaseB);
                                                cmp = profitA - profitB; break;
                                            }
                                            default: cmp = valueA - valueB;
                                        }
                                        return sortDirection === 'asc' ? cmp : -cmp;
                                    }).map(pos => window.renderDesktopPositionRow(pos, ctx))}

                                    {/* Totals Row (from js/renderTable.js) */}
                                    {window.renderDesktopTotalsRow(ctx)}

                                </tbody>
                            </table>
                        </div>

                        {/* Add Position Form + Excel Import (from js/renderTable.js) */}
                        {window.renderAddPositionForm(ctx)}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
