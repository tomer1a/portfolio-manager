<!DOCTYPE html>
<html lang="he" dir="rtl">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ניהול תיק השקעות - Dark Mode</title>

    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        gray: {
                            850: '#1f2937',
                            900: '#111827',
                            950: '#030712',
                        },
                        portfolio: '#3b82f6', // Blue
                        sp500: '#eab308',     // Yellow
                    }
                }
            }
        }
    </script>

    <!-- Firebase Compat SDKs -->
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-auth-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore-compat.js"></script>

    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/react-is@18/umd/react-is.production.min.js"></script>

    <!-- Babel -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- Recharts -->
    <script src="https://unpkg.com/prop-types@15.8.1/prop-types.min.js"></script>
    <script src="https://unpkg.com/recharts@2.12.3/umd/Recharts.js"></script>

    <!-- SheetJS for Excel import -->
    <script src="https://cdn.sheetjs.com/xlsx-0.20.3/package/dist/xlsx.full.min.js"></script>

    <!-- Application CSS (extracted) -->
    <link rel="stylesheet" href="css/styles.css">
</head>

<body class="antialiased min-h-screen">
    <div id="root">
        <div style="padding: 3rem; text-align: center; color: #9ca3af; font-family: sans-serif; direction: rtl;">
            <h2 style="color: white; margin-bottom: 1rem;">טוען את המערכת...</h2>
            <p>מתחבר למסד הנתונים בענן ומכין את התיק האישי שלך</p>
        </div>
    </div>


    <!-- ============================================================= -->
    <!-- Application JavaScript — Pure logic (no JSX)                  -->
    <!-- Loaded as regular scripts so they work with file:// protocol  -->
    <!-- ============================================================= -->
    <script src="js/config.js?v=2"></script>
    <script src="js/utils.js?v=2"></script>
    <script src="js/spData.js?v=2"></script>
    <script src="js/chartBuilder.js?v=2"></script>
    <script src="js/calculations.js?v=2"></script>
    <script src="js/excelImport.js?v=2"></script>
    <script src="js/crypto.js?v=2"></script>
    <script src="js/api.js?v=2"></script>
    <script src="js/handlers.js?v=2"></script>

    <script>
        if ('serviceWorker' in navigator) {
            navigator.serviceWorker.register('./sw.js').catch(function (err) {
                console.warn('SW registration failed:', err);
            });
        }
    </script>

    <script type="text/babel">
        // =====================================================================
        // Library Availability Check
        // =====================================================================
        if (typeof React === 'undefined' || typeof window.Recharts === 'undefined') {
            document.getElementById('root').innerHTML = '<div style="padding: 3rem; text-align: center; color: #f87171; font-family: sans-serif; direction: rtl;"><h2>Connection Error!</h2><p>Libraries failed to load from the internet.</p></div>';
            throw new Error("Libraries failed to load.");
        }

        const { useState, useEffect, useMemo } = React;
        const { ResponsiveContainer, LineChart, Line, AreaChart, Area, XAxis, YAxis, CartesianGrid, Tooltip, ReferenceLine, Dot, PieChart, Pie, Cell, Legend } = window.Recharts;

        // =====================================================================
        // SVG Icon Components
        // =====================================================================
        const IconTrendingUp = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 7 13.5 15.5 8.5 10.5 2 17"></polyline><polyline points="16 7 22 7 22 13"></polyline></svg>;
        const IconTrendingDown = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="22 17 13.5 8.5 8.5 13.5 2 7"></polyline><polyline points="16 17 22 17 22 11"></polyline></svg>;
        const IconSettings = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>;
        const IconTrash = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="3 6 5 6 21 6"></polyline><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a2 2 0 0 1 2-2h4a2 2 0 0 1 2 2v2"></path></svg>;
        const IconEdit = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"></path><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"></path></svg>;
        const IconRefresh = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 2v6h-6"></path><path d="M3 12a9 9 0 1 0 2.81-6.61L21 8"></path></svg>;
        const IconEyeOpen = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"></path><circle cx="12" cy="12" r="3"></circle></svg>;
        const IconEyeClosed = () => <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M17.94 17.94A10.07 10.07 0 0 1 12 20c-7 0-11-8-11-8a18.45 18.45 0 0 1 5.06-5.94M9.9 4.24A9.12 9.12 0 0 1 12 4c7 0 11 8 11 8a18.5 18.5 0 0 1-2.16 3.19m-6.72-1.07a3 3 0 1 1-4.24-4.24"></path><line x1="1" y1="1" x2="23" y2="23"></line></svg>;
        const IconUser = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path><circle cx="12" cy="7" r="4"></circle></svg>;

        // References to external utility functions (from js/*.js files)
        const { getPositionStats, getJaggedNoise, normalizeSymbol, firebaseConfig, initialPositions } = window;

        // --- Login Screen Component ---
        const LoginScreen = ({ onLogin }) => {
            const [mode, setMode] = useState('login'); // 'login' | 'register'
            const [email, setEmail] = useState('');
            const [password, setPassword] = useState('');
            const [confirmPassword, setConfirmPassword] = useState('');
            const [error, setError] = useState('');
            const [loading, setLoading] = useState(false);

            const hebrewError = (code) => {
                const map = {
                    'auth/user-not-found': 'לא נמצא משתמש עם כתובת דוא"ל זו',
                    'auth/wrong-password': 'סיסמה שגויה',
                    'auth/invalid-credential': 'דוא"ל או סיסמה שגויים',
                    'auth/email-already-in-use': 'כתובת הדוא"ל כבר רשומה במערכת',
                    'auth/weak-password': 'הסיסמה חלשה מדי — נדרשים לפחות 6 תווים',
                    'auth/invalid-email': 'כתובת הדוא"ל אינה תקינה',
                    'auth/too-many-requests': 'יותר מדי ניסיונות כניסה. נסה שוב מאוחר יותר',
                    'auth/popup-closed-by-user': 'החלון נסגר לפני השלמת הכניסה',
                    'auth/network-request-failed': 'בעיית רשת. בדוק את החיבור לאינטרנט',
                };
                return map[code] || 'אירעה שגיאה, אנא נסה שוב';
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                setError('');
                if (mode === 'register' && password !== confirmPassword) {
                    setError('הסיסמאות אינן תואמות');
                    return;
                }
                setLoading(true);
                try {
                    var result;
                    if (mode === 'login') {
                        result = await window.signInWithEmail(email, password);
                    } else {
                        result = await window.registerWithEmail(email, password);
                    }
                    onLogin(result.user);
                } catch (err) {
                    setError(hebrewError(err.code));
                } finally {
                    setLoading(false);
                }
            };

            const handleGoogle = async () => {
                setError('');
                setLoading(true);
                try {
                    var result = await window.signInWithGoogle();
                    onLogin(result.user);
                } catch (err) {
                    setError(hebrewError(err.code));
                } finally {
                    setLoading(false);
                }
            };

            return (
                <div className="min-h-screen flex items-center justify-center bg-[#030712] p-4">
                    <div className="w-full max-w-md bg-gray-900 border border-gray-800 rounded-2xl shadow-2xl p-8">
                        <div className="text-center mb-8">
                            <h1 className="text-2xl font-bold text-white mb-1">ניהול תיק השקעות</h1>
                            <p className="text-gray-400 text-sm">{mode === 'login' ? 'התחבר לחשבונך' : 'צור חשבון חדש'}</p>
                        </div>

                        <form onSubmit={handleSubmit} className="space-y-4">
                            <div>
                                <label className="block text-sm text-gray-400 mb-1">כתובת דוא"ל</label>
                                <input
                                    type="email"
                                    value={email}
                                    onChange={(e) => setEmail(e.target.value)}
                                    required
                                    placeholder="you@example.com"
                                    className="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white placeholder-gray-600 focus:outline-none focus:border-blue-500 transition-colors"
                                    dir="ltr"
                                />
                            </div>

                            <div>
                                <label className="block text-sm text-gray-400 mb-1">סיסמה</label>
                                <input
                                    type="password"
                                    value={password}
                                    onChange={(e) => setPassword(e.target.value)}
                                    required
                                    placeholder="לפחות 6 תווים"
                                    className="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white placeholder-gray-600 focus:outline-none focus:border-blue-500 transition-colors"
                                    dir="ltr"
                                />
                            </div>

                            {mode === 'register' && (
                                <div>
                                    <label className="block text-sm text-gray-400 mb-1">אימות סיסמה</label>
                                    <input
                                        type="password"
                                        value={confirmPassword}
                                        onChange={(e) => setConfirmPassword(e.target.value)}
                                        required
                                        placeholder="הכנס שוב את הסיסמה"
                                        className="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white placeholder-gray-600 focus:outline-none focus:border-blue-500 transition-colors"
                                        dir="ltr"
                                    />
                                </div>
                            )}

                            {error && (
                                <div className="bg-red-500/10 border border-red-500/30 rounded-lg px-4 py-2.5 text-red-400 text-sm">
                                    {error}
                                </div>
                            )}

                            <button
                                type="submit"
                                disabled={loading}
                                className="w-full bg-blue-600 hover:bg-blue-500 disabled:opacity-50 disabled:cursor-not-allowed text-white font-semibold py-2.5 rounded-lg transition-colors"
                            >
                                {loading ? 'מתחבר...' : mode === 'login' ? 'התחבר' : 'צור חשבון'}
                            </button>
                        </form>

                        <div className="relative my-5">
                            <div className="absolute inset-0 flex items-center">
                                <div className="w-full border-t border-gray-700"></div>
                            </div>
                            <div className="relative flex justify-center text-sm">
                                <span className="px-3 bg-gray-900 text-gray-500">או</span>
                            </div>
                        </div>

                        <button
                            onClick={handleGoogle}
                            disabled={loading}
                            className="w-full flex items-center justify-center gap-3 bg-gray-800 hover:bg-gray-700 disabled:opacity-50 disabled:cursor-not-allowed border border-gray-700 text-white font-medium py-2.5 rounded-lg transition-colors"
                        >
                            <svg width="18" height="18" viewBox="0 0 18 18" xmlns="http://www.w3.org/2000/svg">
                                <g fill="none" fillRule="evenodd">
                                    <path d="M17.64 9.205c0-.639-.057-1.252-.164-1.841H9v3.481h4.844a4.14 4.14 0 0 1-1.796 2.716v2.259h2.908c1.702-1.567 2.684-3.875 2.684-6.615z" fill="#4285F4"/>
                                    <path d="M9 18c2.43 0 4.467-.806 5.956-2.18l-2.908-2.259c-.806.54-1.837.86-3.048.86-2.344 0-4.328-1.584-5.036-3.711H.957v2.332A8.997 8.997 0 0 0 9 18z" fill="#34A853"/>
                                    <path d="M3.964 10.71A5.41 5.41 0 0 1 3.682 9c0-.593.102-1.17.282-1.71V4.958H.957A8.996 8.996 0 0 0 0 9c0 1.452.348 2.827.957 4.042l3.007-2.332z" fill="#FBBC05"/>
                                    <path d="M9 3.58c1.321 0 2.508.454 3.44 1.345l2.582-2.58C13.463.891 11.426 0 9 0A8.997 8.997 0 0 0 .957 4.958L3.964 7.29C4.672 5.163 6.656 3.58 9 3.58z" fill="#EA4335"/>
                                </g>
                            </svg>
                            המשך עם Google
                        </button>

                        <p className="text-center text-sm text-gray-500 mt-6">
                            {mode === 'login' ? 'אין לך חשבון עדיין?' : 'כבר יש לך חשבון?'}{' '}
                            <button
                                onClick={() => { setMode(mode === 'login' ? 'register' : 'login'); setError(''); }}
                                className="text-blue-400 hover:text-blue-300 font-medium transition-colors"
                            >
                                {mode === 'login' ? 'הירשם כאן' : 'התחבר כאן'}
                            </button>
                        </p>
                    </div>
                </div>
            );
        };

        // --- Main App Component ---
        const App = () => {
            // State
            const [currency, setCurrency] = useState('USD');
            const [exchangeRate, setExchangeRate] = useState(3.65);
            const [apiKey, setApiKey] = useState('');
            const [tempApiKey, setTempApiKey] = useState('');
            const [showSettings, setShowSettings] = useState(false);
            const [apiError, setApiError] = useState('');

            // Portfolio State
            const [cash, setCash] = useState(5000);
            const [cashRate, setCashRate] = useState(null);
            const [positions, setPositions] = useState([]);
            const [initialInvestment, setInitialInvestment] = useState(null);
            const [investmentRate, setInvestmentRate] = useState(null);
            const [spyData, setSpyData] = useState(null);

            // UI States
            const [isEditingCash, setIsEditingCash] = useState(false);
            const [tempCash, setTempCash] = useState('5000');
            const [tempCashRate, setTempCashRate] = useState('');

            const [isAddingCash, setIsAddingCash] = useState(false);
            const [tempAddCash, setTempAddCash] = useState('');
            const [tempAddCashRate, setTempAddCashRate] = useState('');
            const [tempAddCashDate, setTempAddCashDate] = useState('');

            const [isEditingInv, setIsEditingInv] = useState(false);
            const [tempInv, setTempInv] = useState('');
            const [tempInvRate, setTempInvRate] = useState('');

            const [isAddingInv, setIsAddingInv] = useState(false);
            const [tempAddInv, setTempAddInv] = useState('');
            const [tempAddInvRate, setTempAddInvRate] = useState('');
            const [tempAddInvDate, setTempAddInvDate] = useState('');

            const [editingStockId, setEditingStockId] = useState(null);
            const [editStockData, setEditStockData] = useState({ shares: '', price: '' });
            const [loading, setLoading] = useState(true);
            const [historicalFX, setHistoricalFX] = useState(null);
            const [newSymbol, setNewSymbol] = useState('');
            const [newShares, setNewShares] = useState('');
            const [newPrice, setNewPrice] = useState('');
            const [newDate, setNewDate] = useState('');
            const [newCommission, setNewCommission] = useState('');

            // Multi-transaction & dividend states
            const [expandedStocks, setExpandedStocks] = useState({});
            const [dividendForm, setDividendForm] = useState(null); // symbol being edited
            const [tempDivAmount, setTempDivAmount] = useState('');
            const [tempDivDate, setTempDivDate] = useState('');
            const [snapshots, setSnapshots] = useState([]);
            const [chartRange, setChartRange] = useState('ALL');
            const [chartView, setChartView] = useState('performance'); // 'performance' or 'allocation'
            const [cashDeposits, setCashDeposits] = useState([]);

            // Import from anonymous user
            const [importUid, setImportUid] = useState('');
            const [importStatus, setImportStatus] = useState(null); // { ok, message }
            const [importLoading, setImportLoading] = useState(false);
            const [importConfirm, setImportConfirm] = useState(false);

            // Firebase Cloud States
            const [user, setUser] = useState(null);
            const [authReady, setAuthReady] = useState(false);
            const [dbInstance, setDbInstance] = useState(null);
            const [dbReady, setDbReady] = useState(false);
            const [cloudError, setCloudError] = useState('');
            const [refreshTrigger, setRefreshTrigger] = useState(0);

            // Version counter — bumped whenever window.spyHistoricalData is refreshed from Firebase
            const [spDataVersion, setSpDataVersion] = useState(0);

            // Mobile detection
            const [isMobile, setIsMobile] = useState(window.innerWidth < 768);
            const [showMobileMenu, setShowMobileMenu] = useState(false);
            useEffect(() => {
                const handleResize = () => setIsMobile(window.innerWidth < 768);
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            // Toggle for S&P 500 Comparison
            const [showSp500, setShowSp500] = useState(true);
            const [showTaxSection, setShowTaxSection] = useState(false);
            const [showValues, setShowValues] = useState(false);
            const [lastManualUpdate, setLastManualUpdate] = useState(null);

            // Sorting state for positions table
            const [sortColumn, setSortColumn] = useState('weight'); // default: sort by weight (biggest first)
            const [sortDirection, setSortDirection] = useState('desc');

            const handleSort = (column) => {
                if (sortColumn === column) {
                    setSortDirection(prev => prev === 'asc' ? 'desc' : 'asc');
                } else {
                    setSortColumn(column);
                    setSortDirection('desc');
                }
            };

            const getSortArrow = (column) => {
                if (sortColumn !== column) return '⇅';
                return sortDirection === 'asc' ? '▲' : '▼';
            };

            // 1. Initialize Firebase (delegates to api.js)
            useEffect(() => {
                window.initFirebaseAuth({
                    firebaseConfig, setDbInstance, setUser, setAuthReady, setCloudError,
                    setPositions, setDbReady, initialPositions
                });
            }, []);

            // 2. Load cloud data (delegates to api.js)
            useEffect(() => {
                const unsub = window.setupCloudListener({
                    user, dbInstance, normalizeSymbol, setPositions, setCash,
                    setCashRate, setInitialInvestment, setInvestmentRate,
                    setCashDeposits, setApiKey, setTempApiKey,
                    setCloudError, setDbReady, initialPositions, setLastManualUpdate
                });
                return () => unsub();
            }, [user, dbInstance]);

            // SaveToDb wrapper — delegates to api.js
            const saveToDb = (newPositions, newCash, newApiKey, newInitInv, newCashRate, newInvRate, newDeposits, { manualUpdate = true } = {}) => {
                window.savePortfolioToDb(
                    { positions, cash, apiKey, initialInvestment, cashRate, investmentRate, cashDeposits, lastManualUpdate,
                      user, dbInstance, setPositions, setCash, setApiKey, setInitialInvestment,
                      setCashRate, setInvestmentRate, setCashDeposits, setLastManualUpdate },
                    { newPositions, newCash, newApiKey, newInitInv, newCashRate, newInvRate, newDeposits, manualUpdate }
                );
            };

            // 3. Fetch exchange rates (delegates to api.js)
            useEffect(() => {
                window.fetchExchangeRates({ setExchangeRate, setHistoricalFX, setLoading });
            }, []);

            // 4. Fetch realtime stock prices (delegates to api.js)
            useEffect(() => {
                if (dbReady && apiKey) {
                    window.fetchRealtimePrices({
                        positions, apiKey, user, dbInstance, setLoading, setApiError,
                        setSpyData, saveToDb, getPositionStats
                    });
                }
            }, [apiKey, dbReady, refreshTrigger]);

            // 5. Load S&P 500 weekly data from Firebase (global, shared across all users).
            //    Seeds Firebase on first run; refreshes from Finnhub when data is > 7 days old.
            useEffect(() => {
                if (dbReady && user && dbInstance) {
                    window.loadSp500WeeklyData({ dbInstance, user, apiKey, setSpDataVersion });
                }
            }, [dbReady, user, dbInstance, apiKey]);

            // FX History helper
            const getRateAtDate = (dateStr, currentRate) => {
                if (!historicalFX || Object.keys(historicalFX).length === 0) return currentRate;
                const d = new Date(dateStr);
                if (isNaN(d.getTime())) return currentRate;
                const today = new Date();
                if (d.toDateString() === today.toDateString() || d > today) return currentRate;

                // Use local timezone for date key (toISOString uses UTC, which shifts dates
                // by 1 day in Israel timezone and breaks lookups against Frankfurter API data)
                const toLocalDateKey = (dt) => {
                    const y = dt.getFullYear();
                    const m = String(dt.getMonth() + 1).padStart(2, '0');
                    const dd = String(dt.getDate()).padStart(2, '0');
                    return `${y}-${m}-${dd}`;
                };

                let searchDate = new Date(d);
                for (let i = 0; i < 10; i++) {
                    const dateKey = toLocalDateKey(searchDate);
                    if (historicalFX[dateKey]) return historicalFX[dateKey];
                    searchDate.setDate(searchDate.getDate() - 1);
                }
                return currentRate;
            };

                        const PieTooltip = ({ active, payload }) => {

                                            <div>Weight: <span style={{ color: '#fff', fontWeight: 600 }}>{pct}%</span></div>

                                        <ResponsiveContainer width="100%" height="100%">

                                                    data={pieData}

                                                    cy="50%"

                                                    outerRadius={160}

                                                    label={PieLabel}

                                </div>

                    {/* Performance Chart */}
                    {chartView === 'performance' && (() => {
                        // Filter chart data by selected time range
                        const now = Date.now();
                        const rangeMs = {
                            '1M': 30 * 24 * 60 * 60 * 1000,
                            '3M': 90 * 24 * 60 * 60 * 1000,
                            '6M': 180 * 24 * 60 * 60 * 1000,
                            'YTD': now - new Date(new Date().getFullYear(), 0, 1).getTime(),
                            '1Y': 365 * 24 * 60 * 60 * 1000,
                            'ALL': Infinity
                        };
                        const cutoff = chartRange === 'ALL' ? 0 : now - rangeMs[chartRange];
                        const rawFiltered = chartData.filter(d => d.timestamp >= cutoff);
                        const portKey = currency === 'ILS' ? 'portfolioPercentILS' : 'portfolioPercentUSD';
                        const spKey = currency === 'ILS' ? 'sp500PercentILS' : 'sp500PercentUSD';

                        // Rebase to 0% at start of selected range perfectly mathematically
                        const basePort = rawFiltered.length > 0 ? rawFiltered[0][portKey] : 0;
                        const baseSp = rawFiltered.length > 0 ? rawFiltered[0][spKey] : 0;
                        
                        const rebase = (current, base) => (((1 + (current / 100)) / (1 + (base / 100))) - 1) * 100;

                        const filteredData = rawFiltered.map(d => ({
                            ...d,
                            [portKey]: parseFloat(rebase(d[portKey], basePort).toFixed(2)),
                            [spKey]: parseFloat(rebase(d[spKey], baseSp).toFixed(2))
                        }));

                        // Snap the last point to match actual calculated values
                        if (filteredData.length > 0) {
                            if (chartRange === 'YTD') {
                                // Use the real YTD profit percent from API data
                                filteredData[filteredData.length - 1][portKey] = parseFloat(portfolioYtdProfitPercent.toFixed(2));

                        const allVals = filteredData.flatMap(d => showSp500 ? [d[portKey], d[spKey]] : [d[portKey]]).filter(v => v !== undefined);
                        const dataMin = allVals.length > 0 ? Math.floor(Math.min(...allVals) / 5) * 5 - 5 : -20;
                        const dataMax = allVals.length > 0 ? Math.ceil(Math.max(...allVals) / 5) * 5 + 5 : 30;
                        const lastPoint = filteredData.length > 0 ? filteredData[filteredData.length - 1] : null;
                        const portfolioPositive = lastPoint ? lastPoint[portKey] >= 0 : true;

                        // Calculate end-of-range performance for badges
                        const rangePerfPort = lastPoint ? lastPoint[portKey] : 0;
                        const rangePerfSp = lastPoint ? lastPoint[spKey] : 0;
                        const rangeDiff = rangePerfPort - rangePerfSp;

                        // Detect crossover points (portfolio crosses S&P)
                        const crossoverPoints = [];
                        if (showSp500 && filteredData.length > 1) {
                            for (let i = 1; i < filteredData.length; i++) {
                                const prevDiff = filteredData[i-1][portKey] - filteredData[i-1][spKey];
                                const currDiff = filteredData[i][portKey] - filteredData[i][spKey];
                                if ((prevDiff < 0 && currDiff >= 0) || (prevDiff >= 0 && currDiff < 0)) {
                                    crossoverPoints.push(i);
                                }
                            }
                        }

                        // Add crossover markers to data
                        const enrichedData = filteredData.map((d, idx) => ({
                            ...d,
                            crossover: crossoverPoints.includes(idx) ? d[portKey] : undefined

                            const { cx, cy, payload } = props;
                            if (payload.crossover === undefined) return null;
                            return (
                                <g>
                                    <circle cx={cx} cy={cy} r={6} fill="none" stroke="#a78bfa" strokeWidth={2} opacity={0.7} />

                                            className="sr-only"

                                            onChange={(e) => setShowSp500(e.target.checked)}

                                    </div>
                                    <span className={`text-sm font-medium transition-colors ${showSp500 ? 'text-gray-200' : 'text-gray-500 group-hover:text-gray-400'}`}>
                                        השווה למדד S&P 500
                                    </span>
                                </label>

                                        <span style={{ fontSize: '8px' }}>●</span>
                                        תיק {rangePerfPort > 0 ? '+' : ''}{rangePerfPort.toFixed(1)}%
                                    </div>
                                    {showSp500 && (
                                        <div className="flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-bold bg-yellow-500/10 text-yellow-400 border border-yellow-500/20">
                                            <span style={{ fontSize: '8px' }}>●</span>

                                    {showSp500 && (
                                        <div className={`flex items-center gap-1 px-2.5 py-1 rounded-full text-xs font-bold border ${rangeDiff >= 0 ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20' : 'bg-red-500/10 text-red-400 border-red-500/20'}`}>
                                            {rangeDiff >= 0 ? '🏆' : '📉'}
                                            <span dir="ltr">{rangeDiff > 0 ? '+' : ''}{rangeDiff.toFixed(1)}%</span>
                                        </div>
                                    )}
                                </div>
                            </div>

                            {/* Time Range Selector */}
                            <div className="flex items-center gap-2 self-start sm:self-end">
                                <span className="text-sm text-gray-400 font-medium ml-2">טווח ימים:</span>
                                <div className="flex bg-gray-800/80 p-1 rounded-lg border border-gray-700/50" dir="ltr">
                                    {['1M', '3M', '6M', 'YTD', '1Y', 'ALL'].map(range => (

                                            className={`px-3 py-1.5 rounded-md text-xs font-semibold transition-all duration-200 ${chartRange === range
                                                ? 'bg-portfolio text-white shadow-lg shadow-blue-500/20'
                                                : 'text-gray-400 hover:text-white hover:bg-gray-700/50'

                                        >
                                            {range}
                                        </button>
                                    ))}
                                </div>
                            </div>
                        </div>

                        <div className="h-[300px] sm:h-[420px] w-full" dir="ltr">

                                <AreaChart data={enrichedData} margin={{ top: 20, right: 30, left: 0, bottom: 0 }}>
                                    <defs>
                                        <linearGradient id="portfolioGradientGreen" x1="0" y1="0" x2="0" y2="1">
                                            <stop offset="0%" stopColor="#22c55e" stopOpacity={0.35} />
                                            <stop offset="40%" stopColor="#22c55e" stopOpacity={0.12} />

                                        <linearGradient id="portfolioGradientRed" x1="0" y1="0" x2="0" y2="1">

                                            <feFlood floodColor="#22c55e" floodOpacity="0.4" />
                                            <feComposite in2="blur" operator="in" />
                                            <feMerge>
                                                <feMergeNode />
                                                <feMergeNode in="SourceGraphic" />
                                            </feMerge>
                                        </filter>
                                        <filter id="glowRed" x="-20%" y="-20%" width="140%" height="140%">
                                            <feGaussianBlur stdDeviation="3" result="blur" />
                                            <feFlood floodColor="#ef4444" floodOpacity="0.4" />
                                            <feComposite in2="blur" operator="in" />
                                            <feMerge>
                                                <feMergeNode />
                                                <feMergeNode in="SourceGraphic" />
                                            </feMerge>
                                        </filter>
                                        <filter id="glowGold" x="-20%" y="-20%" width="140%" height="140%">
                                            <feGaussianBlur stdDeviation="2.5" result="blur" />
                                            <feFlood floodColor="#eab308" floodOpacity="0.3" />
                                            <feComposite in2="blur" operator="in" />
                                            <feMerge>
                                                <feMergeNode />
                                                <feMergeNode in="SourceGraphic" />

                                        </filter>
                                    </defs>
                                    <CartesianGrid strokeDasharray="3 3" vertical={false} stroke="rgba(55, 65, 81, 0.5)" />
                                    <XAxis
                                        dataKey="dateStr"
                                        tick={{ fill: '#6b7280', fontSize: 11, fontWeight: 500 }}
                                        tickMargin={12}
                                        axisLine={false}
                                        tickLine={false}
                                        minTickGap={50}
                                    />
                                    <YAxis
                                        tickFormatter={(tick) => `${tick > 0 ? '+' : ''}${tick}%`}
                                        tick={{ fill: '#6b7280', fontSize: 11, fontWeight: 500 }}

                                        tickLine={false}
                                        domain={[dataMin, dataMax]}
                                        width={55}
                                    />
                                    <Tooltip 
                                        content={<CustomTooltip />}
                                        cursor={{ stroke: 'rgba(148, 163, 184, 0.3)', strokeWidth: 1, strokeDasharray: '4 4' }}
                                    />
                                    <ReferenceLine y={0} stroke="rgba(75, 85, 99, 0.6)" strokeDasharray="6 3" strokeWidth={1.5} />

                                    {/* S&P 500 Area (Gold) - Optional */}
                                    {showSp500 && (
                                        <Area
                                            type="monotone"
                                            dataKey={spKey}
                                            stroke="#eab308"
                                            strokeWidth={2}
                                            fill="url(#sp500Gradient)"
                                            dot={false}
                                            activeDot={{ r: 6, fill: '#eab308', stroke: '#1f2937', strokeWidth: 3 }}
                                            style={{ filter: 'url(#glowGold)' }}

                                    {/* Crossover marker dots */}
                                    {showSp500 && crossoverPoints.length > 0 && (

                                            type="monotone"
                                            dataKey="crossover"
                                            stroke="none"
                                            fill="none"
                                            dot={<CrossoverDot />}
                                            activeDot={false}
                                            connectNulls={false}
                                            isAnimationActive={false}
                                        />
                                    )}

                                    {/* Portfolio Area (Green when positive, Red when negative) */}
                                    <Area
                                        type="monotone"
                                        dataKey={portKey}
                                        stroke={portfolioPositive ? '#22c55e' : '#ef4444'}
                                        strokeWidth={2.5}
                                        fill={portfolioPositive ? 'url(#portfolioGradientGreen)' : 'url(#portfolioGradientRed)'}
                                        dot={false}
                                        activeDot={{ r: 7, fill: portfolioPositive ? '#22c55e' : '#ef4444', stroke: '#111827', strokeWidth: 3 }}
                                        style={{ filter: portfolioPositive ? 'url(#glowGreen)' : 'url(#glowRed)' }}
                                    />
                                </AreaChart>
                            </ResponsiveContainer>
                        </div>

                        {/* Summary Legend */}
                        <div className="mt-8 flex flex-col md:flex-row justify-between gap-6 rtl-text">

                            {/* כרטיסיית התיק עם אפשרות השקעה ראשונית */}

                                        <div className="w-1.5 h-6 bg-portfolio rounded-full"></div>
                                        <div className="flex flex-col">
                                            <span className="font-semibold text-gray-200">תיק השקעות</span>
                                            {lastManualUpdate && (
                                                <span className="text-[10px] text-gray-500">עודכן: {new Date(lastManualUpdate).toLocaleDateString('he-IL')} {new Date(lastManualUpdate).toLocaleTimeString('he-IL', { hour: '2-digit', minute: '2-digit' })}</span>
                                            )}
                                        </div>
                                    </div>
                                    <div className="flex flex-col sm:flex-row items-start sm:items-center gap-3 sm:gap-6">

                                            <span className="text-base sm:text-lg font-bold text-white leading-none">{formatMoney(portfolioCurrentDisplay)}</span>
                                            <div className="flex flex-wrap items-center gap-x-3 gap-y-1 mt-1">
                                                <div className={`text-xs font-medium flex gap-1 ${portfolioDailyProfit >= 0 ? 'text-green-400' : 'text-red-400'}`}>
                                                    <span>יומי:</span>
                                                    <span dir="ltr">{showValues ? (portfolioDailyProfit >= 0 ? '+' : '') : ''}{formatMoney(portfolioDailyProfit)} ({formatPercent(portfolioDailyProfitPercent)})</span>
                                                </div>
                                                <div className={`text-xs font-medium flex gap-1 ${portfolioYtdProfit >= 0 ? 'text-green-400' : 'text-red-400'}`}>
                                                    <span>מתחילת שנה:</span>
                                                    <span dir="ltr">{showValues ? (portfolioYtdProfit >= 0 ? '+' : '') : ''}{formatMoney(portfolioYtdProfit)} ({formatPercent(portfolioYtdProfitPercent)})</span>
                                                </div>
                                                {portfolioTotalDividends > 0 && (
                                                    <div className="text-xs font-medium flex gap-1 text-emerald-400">
                                                        <span>דיבידנדים:</span>
                                                        <span dir="ltr">+{formatMoney(portfolioTotalDividends)}</span>
                                                    </div>
                                                )}
                                            </div>
                                        </div>
                                        <div className="flex flex-col items-end">
                                            <span className={`font-medium ${portfolioProfitDisplay >= 0 ? 'text-green-400' : 'text-red-400'}`}>
                                                {portfolioProfitDisplay >= 0 ? '+' : ''}{formatMoney(portfolioProfitDisplay)}
                                            </span>
                                            <div className={`mt-1 flex items-center gap-1 px-2.5 py-0.5 rounded-md text-xs font-bold ${portfolioProfitPercentDisplay >= 0 ? 'bg-green-500/10 text-green-400' : 'bg-red-500/10 text-red-400'}`}>
                                                {portfolioProfitPercentDisplay >= 0 ? <IconTrendingUp /> : <IconTrendingDown />}
                                                {Math.abs(portfolioProfitPercentDisplay).toFixed(2) + '%'}
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                {/* שורת "בסיס עלות / הפקדות נטו" */}
                                <div className="mt-4 pt-3 border-t border-gray-700/50 flex flex-col justify-between items-start gap-2 text-sm sm:flex-row sm:items-center">
                                    <span className="text-gray-400 font-medium">השקעה נטו (בסיס עלות):</span>
                                    {isEditingInv ? (
                                        <div className="flex items-center gap-2" dir="ltr">
                                            <input
                                                type="number"
                                                step="any"
                                                placeholder="$ סכום"
                                                title="סכום בדולרים"
                                                value={tempInv}
                                                onChange={e => setTempInv(e.target.value)}
                                                className="w-24 bg-gray-900 border border-gray-600 rounded px-2 py-1 text-white text-xs focus:outline-none focus:border-portfolio"
                                                autoFocus
                                            />
                                            <span className="text-gray-500 text-xs">@</span>
                                            <input
                                                type="number"
                                                step="any"
                                                placeholder="₪ שער"
                                                title="שער דולר (ILS/USD)"
                                                value={tempInvRate}

                                                className="w-20 bg-gray-900 border border-gray-600 rounded px-2 py-1 text-white text-xs focus:outline-none focus:border-portfolio"

                                            <button onClick={() => {

                                            }} className="text-green-400 hover:text-green-300 font-bold">✓</button>
                                            <button onClick={() => setIsEditingInv(false)} className="text-red-400 hover:text-red-300 font-bold">✕</button>

                                                onChange={(e) => setTempAddInvDate(e.target.value)}

                                                className="w-16 bg-gray-900 border border-emerald-500/50 rounded px-2 py-1 text-white text-xs focus:outline-none focus:border-emerald-400"

                                        });

                                        return React.createElement('tr', { className: 'totals-row font-bold' },
                                            React.createElement('td', { className: 'px-2 py-3 text-white text-base' }, '📊 סה\"כ'),
                                            React.createElement('td', { className: 'px-2 py-3' }, ''),
                                            React.createElement('td', { className: 'px-2 py-3' }, ''),
                                            React.createElement('td', { className: 'px-2 py-3' }, ''),
                                            React.createElement('td', { className: 'px-2 py-3' }, ''),
                                            React.createElement('td', { className: 'px-2 py-3' },
                                                React.createElement('div', { className: `flex flex-col ${totalDailyChange >= 0 ? 'text-green-400' : 'text-red-400'}`, dir: 'ltr' },
                                                    React.createElement('span', { className: 'font-bold text-right' }, (totalDailyChange >= 0 ? '+' : '') + formatMoney(totalDailyChange)),
                                                    React.createElement('span', { className: 'text-xs text-right' }, totalValue - (currency === 'ILS' ? cash * exchangeRate : cash) > 0 ? (totalDailyChange >= 0 ? '+' : '') + ((totalDailyChange / (totalValue - (currency === 'ILS' ? cash * exchangeRate : cash) - totalDailyChange)) * 100).toFixed(2) + '%' : '')
                                                )
                                            ),
                                            React.createElement('td', { className: 'px-2 py-3' }, ''),
                                            React.createElement('td', { className: 'px-2 py-3' }, ''),
                                            React.createElement('td', { className: 'px-2 py-3 text-white' }, formatMoney(totalValue)),
                                            React.createElement('td', { className: 'px-2 py-3 text-gray-300' }, '100%'),
                                            React.createElement('td', { className: 'px-2 py-3' },
                                                React.createElement('div', { className: `flex flex-col ${totalProfit >= 0 ? 'text-green-400' : 'text-red-400'}` },
                                                    React.createElement('span', { className: 'font-bold' }, (totalProfit >= 0 ? '+' : '') + formatMoney(totalProfit)),
                                                    React.createElement('span', { className: 'text-xs' }, totalCost > 0 ? (totalProfit >= 0 ? '+' : '') + ((totalProfit / totalCost) * 100).toFixed(2) + '%' : '')
                                                )
                                            ),
                                            React.createElement('td', { className: 'px-2 py-3' }, '')
                                        );
                                    })()}
                                </tbody>
                            </table>
                        </div>

                        {/* Add New Position Form */}
                        <div className="p-4 sm:p-6 bg-gray-900/50 border-t border-gray-800">
                            <h3 className="text-sm font-semibold text-gray-400 mb-4">הוסף נכס חדש</h3>
                            <form onSubmit={handleAddPosition} className="grid grid-cols-1 md:grid-cols-6 gap-4">
                                <div>
                                    <input required type="text" placeholder="סמל (למשל AAPL)" value={newSymbol} onChange={e => setNewSymbol(e.target.value)} className="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-portfolio text-sm" />
                                </div>
                                <div>
                                    <input required type="number" step="any" placeholder="כמות מניות" value={newShares} onChange={e => setNewShares(e.target.value)} className="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-portfolio text-sm" />
                                </div>
                                <div>
                                    <input required type="number" step="any" placeholder={`שער קנייה ב-${currency}`} value={newPrice} onChange={e => setNewPrice(e.target.value)} className="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-portfolio text-sm" />
                                </div>
                                <div>
                                    <input required type="date" value={newDate} onChange={e => setNewDate(e.target.value)} className="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-portfolio text-sm custom-date-input" style={{ colorScheme: 'dark' }} />
                                </div>
                                <div>
                                    <input type="number" step="any" min="0" placeholder={`עמלה ב-${currency}`} value={newCommission} onChange={e => setNewCommission(e.target.value)} className="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-portfolio text-sm" />
                                </div>
                                <div>
                                    <button type="submit" className="w-full bg-portfolio hover:bg-blue-600 text-white font-medium rounded-lg px-4 py-2.5 transition-colors shadow-lg shadow-blue-500/20">
                                        הוסף לתיק
                                    </button>
                                </div>
                            </form>

                            {/* Excel Import */}
                            <div className="mt-4 pt-4 border-t border-gray-700/50 flex flex-col sm:flex-row items-start sm:items-center gap-3 sm:gap-4">
                                <label className="cursor-pointer flex items-center gap-2 bg-emerald-600/20 hover:bg-emerald-600/30 text-emerald-400 border border-emerald-500/30 rounded-lg px-4 py-2.5 transition-colors text-sm font-medium">
                                    <span>📥 ייבוא מאקסל</span>
                                    <input
                                        type="file"
                                        accept=".xlsx,.xls,.csv"
                                        onChange={handleExcelImport}
                                        className="hidden"
                                    />
                                </label>
                                <span className="text-xs text-gray-500">העלה קובץ XLSX עם פירוט תנועות (תאריך, סוג פעולה, שם הנייר, כמות, מחיר)</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
