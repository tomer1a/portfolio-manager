            // 3. Save Function to Cloud

                        // Add current price as the final anchor

                        anchors.forEach(a => {

                            if (existing) { existing.price = a.price; }
                            else { uniqueAnchors.push({ ...a }); }
                        });
                        uniqueAnchors.sort((a, b) => a.time - b.time);

                        const estimatePrice = (time) => {
                            if (time <= uniqueAnchors[0].time) return uniqueAnchors[0].price;
                            if (time >= uniqueAnchors[uniqueAnchors.length - 1].time) return uniqueAnchors[uniqueAnchors.length - 1].price;

                            for (let i = 0; i < uniqueAnchors.length - 1; i++) {
                                if (time >= uniqueAnchors[i].time && time < uniqueAnchors[i + 1].time) {
                                    const segDuration = uniqueAnchors[i + 1].time - uniqueAnchors[i].time;
                                    const segElapsed = time - uniqueAnchors[i].time;

                                    const basePrice = uniqueAnchors[i].price + (uniqueAnchors[i + 1].price - uniqueAnchors[i].price) * segProgress;

                                    const distFromEdge = Math.min(segProgress, 1 - segProgress) * 2;

                // Edit mode now edits the entire position's latest transaction or first one
                const stats = getPositionStats(pos);
                const rateAtPurchase = currency === 'ILS' ? getRateAtDate(stats.earliestDate, exchangeRate) : 1;
                setEditingStockId(pos.id);
                setEditStockData({
                    shares: stats.totalShares.toString(),
                    price: (stats.avgPrice * rateAtPurchase).toFixed(2)
                });
            };

            const saveStockEdit = (id, originalDate) => {
                const rateAtPurchase = currency === 'ILS' ? getRateAtDate(originalDate, exchangeRate) : 1;
                const editedShares = parseFloat(editStockData.shares);
                const editedPriceUSD = parseFloat(editStockData.price) / rateAtPurchase;

                if (isNaN(editedShares) || isNaN(editedPriceUSD)) return;

                // Replace all transactions with a single consolidated one
                const updatedPositions = positions.map(p =>
                    p.id === id ? { ...p, transactions: [{ id: 't_' + Date.now(), shares: editedShares, price: editedPriceUSD, date: originalDate }] } : p
                );
                saveToDb(updatedPositions, undefined, undefined, undefined, undefined, undefined);
                setEditingStockId(null);
            };

            // Dividend handlers
            const handleAddDividend = (posId) => {
                const amount = parseFloat(tempDivAmount);
                if (!amount || !tempDivDate) return;
                const pos = positions.find(p => p.id === posId);
                if (!pos) return;
                const stats = getPositionStats(pos);
                
                const divTotalUSD = amount * stats.totalShares;
                const newDiv = {
                    id: 'd_' + Date.now(),
                    amountPerShare: amount,
                    totalAmount: divTotalUSD,
                    date: tempDivDate
                };

                const updatedPositions = positions.map(p =>
                    p.id === posId ? { ...p, dividends: [...(p.dividends || []), newDiv] } : p
                );

                // Add dividend to cash (net after 25% US withholding tax)
                const TAX_RATE_DIV = 0.25;
                const divNetUSD = divTotalUSD * (1 - TAX_RATE_DIV);
                const currentCash = cash || 0;
                const newCash = currentCash + divNetUSD;
                let newCashRate = cashRate !== null ? cashRate : exchangeRate;
                const rRate = currency === 'ILS' ? getRateAtDate(tempDivDate, exchangeRate) : 1;

                if (newCash > 0 && divNetUSD > 0) {
                    newCashRate = ((currentCash * newCashRate) + (divNetUSD * rRate)) / newCash;
                }

                saveToDb(updatedPositions, newCash, undefined, undefined, newCashRate, undefined);
                setDividendForm(null);
                setTempDivAmount('');
                setTempDivDate('');
            };

            const removeDividend = (posId, divId) => {
                let divAmountToRemove = 0;

                const updatedPositions = positions.map(p => {
                    if (p.id === posId) {
                        const divToRemove = (p.dividends || []).find(d => d.id === divId);
                        if (divToRemove) {
                            divAmountToRemove = divToRemove.totalAmount;
                        }
                        return { ...p, dividends: (p.dividends || []).filter(d => d.id !== divId) };
                    }
                    return p;
                });

                // Deduct dividend from cash (if deleted)
                const currentCash = cash || 0;
                const newCash = currentCash - divAmountToRemove;
                const newCashRate = cashRate !== null ? cashRate : exchangeRate; // Rate typically unchanged on subtraction

                saveToDb(updatedPositions, newCash, undefined, undefined, newCashRate, undefined);
            };

            const cancelStockEdit = () => {
                setEditingStockId(null);
            };

            // ===== EXCEL IMPORT =====
            const handleExcelImport = async (e) => {
                const file = e.target.files[0];
                if (!file) return;
                e.target.value = '';

                const parseNum = (val) => {
                    if (val === undefined || val === null || val === '' || val === '-') return 0;
                    const cleaned = val.toString().replace(/[\$,₪\s]/g, '').trim();
                    if (cleaned === '' || cleaned === '-') return 0;
                    return parseFloat(cleaned) || 0;
                };

                try {
                    const fileData = await file.arrayBuffer();
                    const workbook = XLSX.read(fileData, { type: 'array' });
                    const sheet = workbook.Sheets[workbook.SheetNames[0]];
                    const allRows = XLSX.utils.sheet_to_json(sheet, { header: 1 });

                    // Find header row dynamically
                    let headerIdx = -1;
                    let colMap = {};
                    for (let i = 0; i < Math.min(allRows.length, 10); i++) {
                        const row = allRows[i];
                        if (!row) continue;
                        const cells = Array.from(row, c => (c === undefined || c === null ? '' : c).toString().trim());
                        const hasDate = cells.findIndex(c => c === 'תאריך');
                        const hasAction = cells.findIndex(c => c.includes('סוג'));
                        if (hasDate >= 0 && hasAction >= 0) {
                            headerIdx = i;
                            cells.forEach((c, j) => {
                                if (c === 'תאריך') colMap.date = j;
                                else if (c.includes('סוג')) colMap.action = j;
                                else if (c.includes('נייר')) colMap.symbol = j;
                                else if (c === 'כמות' || c === 'במות') colMap.qty = j;
                                else if (c.includes('מחיר')) colMap.price = j;
                                else if (c.includes('סכום')) colMap.amount = j;
                                else if (c.includes('עמלה')) colMap.fee = j;
                                else if (c.includes('יתר')) colMap.cash = j;
                            });
                            break;
                        }
                    }

                    if (headerIdx < 0) {
                        alert('לא נמצאה שורת כותרות.\nדרוש: תאריך, סוג פעולה, שם הנייר, כמות, מחיר');
                        return;
                    }

                    console.log('Excel: header row', headerIdx, colMap);
                    const dataRows = allRows.slice(headerIdx + 1).filter(r => r && r.length > 0);
                    if (dataRows.length === 0) { alert('אין נתונים בקובץ'); return; }

                    const posMap = {};
                    let finalCash = null;
                    let totalDeposits = 0;
                    const depositEvents = [];
                    let buyCount = 0, sellCount = 0, divCount = 0, depositCount = 0;

                    dataRows.forEach((row, idx) => {
                        const action = colMap.action !== undefined ? (row[colMap.action] || '').toString().trim() : '';
                        const symbol = colMap.symbol !== undefined ? normalizeSymbol((row[colMap.symbol] || '').toString().trim()) : '';
                        const qty = colMap.qty !== undefined ? parseNum(row[colMap.qty]) : 0;
                        const price = colMap.price !== undefined ? parseNum(row[colMap.price]) : 0;
                        const amount = colMap.amount !== undefined ? parseNum(row[colMap.amount]) : 0;
                        const cashBal = colMap.cash !== undefined ? parseNum(row[colMap.cash]) : NaN;
                        const dateRawVal = colMap.date !== undefined ? row[colMap.date] : '';

                        let dateStr = '';
                        if (dateRawVal instanceof Date) {
                            // SheetJS returned a JS Date object
                            dateStr = dateRawVal.toISOString().split('T')[0];
                        } else if (typeof dateRawVal === 'number' && dateRawVal > 30000) {
                            // Excel serial date number (days since 1900-01-01)
                            const excelEpoch = new Date(1899, 11, 30);
                            const jsDate = new Date(excelEpoch.getTime() + dateRawVal * 86400000);
                            dateStr = jsDate.toISOString().split('T')[0];
                        } else if (dateRawVal) {
                            const raw = dateRawVal.toString().trim();
                            const parts = raw.split(/[.\\/\-]/);
                            if (parts.length === 3) {
                                const [a, b, c] = parts;
                                if (a.length === 4) {
                                    dateStr = `${a}-${b.padStart(2, '0')}-${c.padStart(2, '0')}`;
                                } else {
                                    dateStr = `${c}-${b.padStart(2, '0')}-${a.padStart(2, '0')}`;
                                }
                            }
                        }

                        if (!isNaN(cashBal) && cashBal !== 0) finalCash = cashBal;

                        if (action === 'קנייה' && symbol && qty > 0) {
                            if (!posMap[symbol]) posMap[symbol] = { transactions: [], dividends: [] };
                            posMap[symbol].transactions.push({ id: 't_imp_' + idx, shares: qty, price, date: dateStr });
                            buyCount++;
                        } else if (action === 'מכירה' && symbol && qty > 0) {
                            if (!posMap[symbol]) posMap[symbol] = { transactions: [], dividends: [] };
                            posMap[symbol].transactions.push({ id: 't_imp_' + idx, shares: -qty, price, date: dateStr });
                            sellCount++;
                        } else if (action === 'הפקדה') {
                            const depAmt = Math.abs(amount);
                            totalDeposits += depAmt;
                            depositEvents.push({ id: 'dep_imp_' + idx, amount: depAmt, date: dateStr });
                            depositCount++;
                        } else if (action === 'דיבידנד' && symbol) {
                            if (!posMap[symbol]) posMap[symbol] = { transactions: [], dividends: [] };
                            const divAmt = Math.abs(amount);
                            posMap[symbol].dividends.push({ id: 'div_imp_' + idx, amount: divAmt, totalAmount: divAmt, date: dateStr });
                            divCount++;
                        }
                    });

                    const symbolList = Object.keys(posMap);
                    const summary = `נמצאו ${symbolList.length} מניות:\n` +
                        symbolList.join(', ') + '\n\n' +
                        `${buyCount} קניות, ${sellCount} מכירות, ${divCount} דיבידנדים, ${depositCount} הפקדות\n` +
                        (finalCash !== null ? `יתרת מזומן: $${finalCash.toFixed(2)}\n` : '') +
                        `סה"כ הפקדות: $${totalDeposits.toFixed(2)}\n\n` +
                        'לייבא את הנתונים? (זה יחליף את התיק הנוכחי)';

                    if (!confirm(summary)) return;

                    const newPositions = [];
                    for (const sym of symbolList) {
                        const pd = posMap[sym];
                        const totalShares = pd.transactions.reduce((s, t) => s + t.shares, 0);
                        if (totalShares < 0) continue; // skip invalid negatives, but keep fully sold (0 shares)

                        let currentPrice = 0;
                        if (apiKey && totalShares > 0) { // only fetch price for positions with shares
                            try {
                                const res = await fetch(`https://finnhub.io/api/v1/quote?symbol=${sym}&token=${apiKey}`);
                                if (res.ok) { const q = await res.json(); if (q && q.c) currentPrice = q.c; }
                                await new Promise(r => setTimeout(r, 200));
                            } catch (err) { console.error('Price fetch error for', sym, err); }
                        }

                        newPositions.push({
                            id: Date.now() + Math.random(),
                            symbol: sym,
                            transactions: pd.transactions,
                            dividends: pd.dividends,
                            currentPrice: currentPrice
                        });
                    }

                    const newCash = finalCash !== null ? finalCash : cash;
                    await saveToDb(newPositions, newCash, undefined, totalDeposits > 0 ? totalDeposits : undefined, undefined, undefined, depositEvents);
                    alert(`✅ יובאו בהצלחה ${newPositions.length} מניות!\nהמערכת תרענן מחירים בטעינה הבאה.`);
                    window.location.reload();
                } catch (err) {
                    console.error('Excel import error:', err);
                    alert('שגיאה בייבוא: ' + err.message);
                }
            };

            const handleAddCashSubmit = () => {
                const addedAmount = parseFloat(tempAddCash);
                let addedRate = parseFloat(tempAddCashRate);

                if (tempAddCashDate) {
                    addedRate = getRateAtDate(tempAddCashDate, exchangeRate);
                } else if (isNaN(addedRate)) {
                    addedRate = exchangeRate;
                }

                if (!isNaN(addedAmount) && addedAmount !== 0) {
                    let currentCash = cash || 0;
                    let currentCashRate = cashRate !== null ? cashRate : exchangeRate;

                    let newCash = currentCash + addedAmount;
                    let newCashRate = currentCashRate;

                    if (newCash > 0) {
                        if (addedAmount > 0) {
                            newCashRate = ((currentCash * currentCashRate) + (addedAmount * addedRate)) / newCash;
                        }
                    } else {
                        newCashRate = exchangeRate;
                    }

                    saveToDb(undefined, newCash, undefined, undefined, newCashRate, undefined);
                }
                setIsAddingCash(false);
            };

            const handleAddInvSubmit = () => {
                const addedAmount = parseFloat(tempAddInv);
                let addedRate = parseFloat(tempAddInvRate);

                if (tempAddInvDate) {
                    addedRate = getRateAtDate(tempAddInvDate, exchangeRate);
                } else if (isNaN(addedRate)) {
                    addedRate = exchangeRate;
                }

                if (!isNaN(addedAmount) && addedAmount !== 0) {
                    let currentInv = initialInvestment;
                    let currentInvRate = investmentRate !== null ? investmentRate : exchangeRate;

                    if (currentInv === null) {
                        let dCostUSD = cash;
                        let dCostILS = cash * (cashRate !== null ? cashRate : exchangeRate);
                        positions.forEach(pos => {
                            const rP = getRateAtDate(pos.purchaseDate, exchangeRate);
                            dCostUSD += pos.shares * pos.purchasePrice;
                            dCostILS += pos.shares * pos.purchasePrice * rP;
                        });
                        currentInv = dCostUSD;
                        currentInvRate = dCostUSD > 0 ? (dCostILS / dCostUSD) : exchangeRate;
                    }

                    let newInv = currentInv + addedAmount;
                    let newInvRate = currentInvRate;

                    if (newInv > 0) {
                        newInvRate = ((currentInv * currentInvRate) + (addedAmount * addedRate)) / newInv;
                    } else {
                        newInvRate = exchangeRate;
                    }

                    // Simultaneously add the exact deposited investment amount to the Cash Balance
                    const currentCash = cash || 0;
                    const newCash = currentCash + addedAmount;
                    let newCashRate = cashRate !== null ? cashRate : exchangeRate;
                    if (newCash > 0 && addedAmount > 0) {
                        newCashRate = ((currentCash * newCashRate) + (addedAmount * addedRate)) / newCash;
                    }

                    saveToDb(undefined, newCash, undefined, newInv, newCashRate, newInvRate);
                }
                setIsAddingInv(false);
            };

            // Custom Tooltip for Chart
            const CustomTooltip = ({ active, payload, label }) => {
                if (active && payload && payload.length) {
                    const portPoint = payload.find(p => p.dataKey === 'portfolioPercentUSD' || p.dataKey === 'portfolioPercentILS');
                    const spPoint = payload.find(p => p.dataKey === 'sp500PercentUSD' || p.dataKey === 'sp500PercentILS');

                    const absValue = currency === 'ILS' ? portPoint?.payload?.absoluteValILS : portPoint?.payload?.absoluteValUSD;
                    const displayValue = formatMoney(absValue || 0);
                    const portVal = portPoint?.value || 0;
                    const spVal = spPoint?.value || 0;
                    const diff = portVal - spVal;
                    const isOutperforming = diff >= 0;

                    // Calculate approximate S&P 500 absolute value for tooltip
                    let sp500AbsDisplay = '';
                    if (spyData && spyData.current) {
                        const spAbsUSD = spyData.current * 10; // approximate scaled value
                        sp500AbsDisplay = formatMoney(currency === 'ILS' ? spAbsUSD * exchangeRate : spAbsUSD);
                    }

                    return (
                        <div className="chart-tooltip p-4 rounded-xl min-w-[240px]" style={{ borderRadius: '14px' }}>
                            {/* Date header */}
                            <div className="flex items-center gap-2 mb-3 pb-2" style={{ borderBottom: '1px solid rgba(75, 85, 99, 0.3)' }}>
                                <span style={{ fontSize: '11px', color: '#9ca3af', letterSpacing: '0.05em', textTransform: 'uppercase', fontWeight: 600 }}>📅</span>
                                <span style={{ fontSize: '13px', color: '#d1d5db', fontWeight: 600, letterSpacing: '0.02em' }} dir="ltr">{label}</span>
                            </div>

                            <div style={{ display: 'flex', flexDirection: 'column', gap: '10px' }}>
                                {/* Portfolio row */}
                                <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: '16px' }} dir="ltr">
                                    <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                                        <div style={{ width: '10px', height: '10px', borderRadius: '50%', background: portVal >= 0 ? '#22c55e' : '#ef4444', boxShadow: portVal >= 0 ? '0 0 8px rgba(34,197,94,0.5)' : '0 0 8px rgba(239,68,68,0.5)' }}></div>
                                        <span style={{ color: '#e5e7eb', fontWeight: 500, fontSize: '13px' }}>תיק השקעות</span>
                                    </div>
                                    <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end' }}>
                                        <span style={{ fontWeight: 700, fontSize: '14px', color: portVal >= 0 ? '#4ade80' : '#f87171' }}>
                                            {portVal > 0 ? '+' : ''}{portVal.toFixed(2)}%
                                        </span>
                                        <span style={{ fontSize: '11px', color: '#9ca3af', fontWeight: 500 }}>{displayValue}</span>
                                    </div>
                                </div>

                                {/* S&P 500 row */}
                                {showSp500 && (
                                    <div style={{ display: 'flex', alignItems: 'center', justifyContent: 'space-between', gap: '16px' }} dir="ltr">
                                        <div style={{ display: 'flex', alignItems: 'center', gap: '8px' }}>
                                            <div style={{ width: '10px', height: '10px', borderRadius: '50%', background: '#eab308', boxShadow: '0 0 8px rgba(234,179,8,0.4)' }}></div>
                                            <span style={{ color: '#e5e7eb', fontWeight: 500, fontSize: '13px' }}>S&P 500</span>
                                        </div>
                                        <div style={{ display: 'flex', flexDirection: 'column', alignItems: 'flex-end' }}>
                                            <span style={{ fontWeight: 700, fontSize: '14px', color: '#facc15' }}>
                                                {spVal > 0 ? '+' : ''}{spVal.toFixed(2)}%
                                            </span>
                                            {sp500AbsDisplay && <span style={{ fontSize: '11px', color: '#9ca3af', fontWeight: 500 }}>{sp500AbsDisplay}</span>}
                                        </div>
                                    </div>
                                )}

                                {/* Difference row - only when S&P is visible */}
                                {showSp500 && (
                                    <div style={{ marginTop: '4px', paddingTop: '8px', borderTop: '1px solid rgba(75, 85, 99, 0.3)', display: 'flex', alignItems: 'center', justifyContent: 'space-between' }} dir="ltr">
                                        <span style={{ fontSize: '11px', color: '#9ca3af', fontWeight: 500 }}>{isOutperforming ? '🏆' : '📉'} הפרש ביצועים</span>
                                        <span style={{ fontWeight: 700, fontSize: '13px', color: isOutperforming ? '#4ade80' : '#f87171', background: isOutperforming ? 'rgba(34,197,94,0.1)' : 'rgba(239,68,68,0.1)', padding: '2px 8px', borderRadius: '6px' }}>
                                            {diff > 0 ? '+' : ''}{diff.toFixed(2)}%
                                        </span>
                                    </div>
                                )}
                            </div>
                        </div>
                    );
                }
                return null;
            };

            if (!dbReady) {
                return (
                    <div className="min-h-screen flex items-center justify-center bg-[#030712] text-white">
                        <div className="animate-pulse text-xl">טוען את המערכת...</div>
                    </div>
                );
            }

            return (
                <div className="max-w-6xl mx-auto p-4 md:p-6 space-y-6">
                    {/* Header */}
                    <header className="flex flex-col md:flex-row justify-between items-start md:items-center gap-4 bg-gray-900 p-4 md:p-6 rounded-2xl border border-gray-800 shadow-lg">
                        <div>
                            <div className="flex items-center gap-3">
                                <h1 className="text-2xl font-bold text-white flex items-center gap-2">
                                    ניהול תיק השקעות
                                </h1>
                                {/* Cloud/Local Badge */}
                                <div
                                    className={`flex items-center gap-1.5 text-xs px-2.5 py-1 rounded-full border cursor-default transition-colors ${user ? 'bg-emerald-500/10 text-emerald-400 border-emerald-500/20' : cloudError ? 'bg-red-500/10 text-red-400 border-red-500/20' : 'bg-gray-800 text-gray-400 border-gray-700'}`}
                                    title={user ? `מחובר לענן (משתמש: ${user.uid.substring(0, 5)}...)` : cloudError ? `שגיאת חיבור לענן: ${cloudError}` : 'מצב מקומי (הנתונים יישמרו רק בדפדפן הזה)'}
                                >
                                    <IconUser />
                                    {user ? 'שמור בענן' : cloudError ? 'שגיאת חיבור' : 'מקומי'}
                                </div>
                                {loading && <span className="text-sm font-normal text-gray-500 animate-pulse">(מרענן...)</span>}
                            </div>
                            <p className="text-gray-400 text-sm mt-1">מעקב בזמן אמת והיסטוריית ביצועים - מותאם אישית</p>
                        </div>

                        <div className="flex items-center gap-4 w-full md:w-auto">
                            {/* Currency Toggle */}
                            <div className="flex bg-gray-800 p-1 rounded-lg border border-gray-700">
                                <button
                                    onClick={() => setCurrency('USD')}
                                    className={`px-4 py-1.5 rounded-md text-sm font-medium transition-colors ${currency === 'USD' ? 'bg-gray-700 text-white shadow' : 'text-gray-400 hover:text-white'}`}
                                >
                                    $ USD
                                </button>
                                <button
                                    onClick={() => setCurrency('ILS')}
                                    className={`px-4 py-1.5 rounded-md text-sm font-medium transition-colors ${currency === 'ILS' ? 'bg-gray-700 text-white shadow' : 'text-gray-400 hover:text-white'}`}
                                >
                                    ₪ ILS
                                </button>
                            </div>

                            {/* Show/Hide Values Toggle */}
                            <button
                                onClick={() => setShowValues(!showValues)}
                                className={`p-2 rounded-lg border transition-colors ${showValues ? 'bg-gray-800 text-emerald-400 border-emerald-500/30 hover:text-emerald-300' : 'bg-gray-800 text-gray-400 border-gray-700 hover:text-white'}`}
                                title={showValues ? 'הסתר סכומים' : 'הצג סכומים'}
                            >
                                {showValues ? <IconEyeOpen /> : <IconEyeClosed />}
                            </button>

                            {/* Refresh Button */}
                            <button
                                onClick={() => {
                                    if (apiKey) {
                                        setRefreshTrigger(prev => prev + 1);
                                    }
                                    else setShowSettings(true);
                                }}
                                className="p-2 bg-gray-800 text-gray-400 hover:text-portfolio rounded-lg border border-gray-700 transition-colors"
                                title="רענן מחירים מה-API"
                            >
                                <IconRefresh />
                            </button>

                            {/* Settings Toggle */}
                            <button
                                onClick={() => setShowSettings(!showSettings)}
                                className="p-2 bg-gray-800 text-gray-400 hover:text-white rounded-lg border border-gray-700 transition-colors"
                            >
                                <IconSettings />
                            </button>
                        </div>
                    </header>

                    {/* Settings Panel */}
                    {showSettings && (
                        <div className="bg-gray-850 p-4 rounded-xl border border-gray-700 shadow-md animate-fade-in">
                            <h3 className="text-lg font-semibold mb-3 text-gray-200">הגדרות מתקדמות</h3>
                            <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                                <div>
                                    <label className="block text-sm text-gray-400 mb-1">Finnhub API Key (לנתוני אמת)</label>
                                    <div className="flex gap-2">
                                        <input
                                            type="password"
                                            value={tempApiKey}
                                            onChange={(e) => setTempApiKey(e.target.value)}
                                            placeholder="הכנס מפתח API כאן..."
                                            className="w-full bg-gray-900 border border-gray-700 rounded-lg px-4 py-2 text-white focus:outline-none focus:border-portfolio transition-colors"
                                        />
                                        <button
                                            onClick={() => saveToDb(undefined, undefined, tempApiKey, undefined, undefined, undefined)}
                                            className="bg-portfolio hover:bg-blue-600 text-white px-4 py-2 rounded-lg transition-colors text-sm font-medium whitespace-nowrap"
                                        >
                                            שמור והתחבר
                                        </button>
                                    </div>
                                    {apiError ? (
                                        <p className="text-xs text-red-400 mt-1">{apiError}</p>
                                    ) : (
                                        <p className="text-xs text-gray-500 mt-1">ללא מפתח יוצגו נתוני דמה (Mock Data) להמחשה. המפתח נשמר בחשבון הענן שלך.</p>
                                    )}
                                </div>
                                <div>
                                    <label className="block text-sm text-gray-400 mb-1">שער דולר נוכחי (לחישוב שווי יומי)</label>
                                    <input
                                        type="number"
                                        step="0.001"
                                        value={exchangeRate}
                                        onChange={(e) => {
                                            const val = parseFloat(e.target.value);
                                            if (!isNaN(val)) setExchangeRate(val);
                                        }}

                                                            React.createElement('div', { className: 'flex items-center gap-1 mt-1', dir: 'ltr' },
                                                                React.createElement('input', { type: 'number', step: 'any', placeholder: '$/share', value: tempDivAmount, onChange: e => setTempDivAmount(e.target.value), className: 'w-16 bg-gray-900 border border-emerald-500/50 rounded px-1 py-0.5 text-white text-xs focus:outline-none' }),
                                                                React.createElement('input', { type: 'date', value: tempDivDate, onChange: e => setTempDivDate(e.target.value), className: 'w-24 bg-gray-900 border border-emerald-500/50 rounded px-1 py-0.5 text-white text-xs focus:outline-none', style: { colorScheme: 'dark' } }),
                                                                React.createElement('button', { onClick: () => handleAddDividend(pos.id), className: 'text-green-400 hover:text-green-300 text-xs' }, '✓'),
                                                                React.createElement('button', { onClick: () => setDividendForm(null), className: 'text-red-400 hover:text-red-300 text-xs' }, '✕')
                                                            )
                                                        : React.createElement('button', {
                                                            onClick: () => { setDividendForm(pos.id); setTempDivAmount(''); setTempDivDate(''); },
                                                            className: 'text-xs text-emerald-400 hover:text-emerald-300 mt-0.5'
                                                        }, '+ הוסף')
                                                    )
                                                ),
                                                React.createElement('td', { className: 'px-2 py-3 font-bold text-white' }, formatMoney(value)),
                                                React.createElement('td', { className: 'px-2 py-3' },
                                                    React.createElement('div', { className: 'flex flex-col gap-1' },
                                                        React.createElement('span', { className: 'text-gray-300 font-medium text-xs' },
                                                            portfolioCurrentDisplay > 0 ? ((value / portfolioCurrentDisplay) * 100).toFixed(2) + '%' : '0.00%'
                                                        ),
                                                        React.createElement('div', { className: 'weight-bar-container' },
                                                            React.createElement('div', {
                                                                className: 'weight-bar-fill',
                                                                style: { width: (portfolioCurrentDisplay > 0 ? Math.min(((value / portfolioCurrentDisplay) * 100), 100) : 0) + '%' }
                                                            })
                                                        )
                                                    )
                                                ),
                                                React.createElement('td', { className: 'px-2 py-3' },
                                                    React.createElement('div', { className: `flex flex-col ${profit >= 0 ? 'text-green-400' : 'text-red-400'}` },
                                                        React.createElement('span', { className: 'font-medium' }, (profit >= 0 ? '+' : '') + formatMoney(profit)),
                                                        React.createElement('span', { className: 'text-xs' }, (profitPct >= 0 ? '+' : '') + profitPct.toFixed(2) + '%')
                                                    )
                                                ),
                                                React.createElement('td', { className: 'px-2 py-3 text-center' },
                                                    isEditing ?
                                                        React.createElement('div', { className: 'flex items-center justify-center gap-3' },
                                                            React.createElement('button', { onClick: () => saveStockEdit(pos.id, stats.earliestDate), className: 'text-green-400 hover:text-green-300', title: 'שמור' }, '✓'),
                                                            React.createElement('button', { onClick: cancelStockEdit, className: 'text-red-400 hover:text-red-300', title: 'בטל' }, '✕')
                                                        )
                                                    : React.createElement('div', { className: 'flex items-center justify-center gap-2' },
                                                        React.createElement('button', { onClick: () => startEditingStock(pos), className: 'p-2 text-gray-500 hover:text-portfolio hover:bg-blue-500/10 rounded-lg transition-colors', title: 'ערוך' }, React.createElement(IconEdit)),
                                                        React.createElement('button', { onClick: () => removePosition(pos.id), className: 'p-2 text-gray-500 hover:text-red-400 hover:bg-red-500/10 rounded-lg transition-colors', title: 'מחק' }, React.createElement(IconTrash))
                                                    )
                                                )
                                            ),
                                            // Expanded transactions rows
                                            isExpanded && stats.transactions.map(txn => {
                                                const txnRateAtPurchase = currency === 'ILS' ? getRateAtDate(txn.date, exchangeRate) : 1;
                                                const txnCost = txn.shares * txn.price * txnRateAtPurchase;
                                                const txnValue = txn.shares * pos.currentPrice * rateNow;
                                                const txnProfit = txnValue - txnCost;
                                                const txnProfitPct = txnCost > 0 ? (txnProfit / txnCost) * 100 : 0;
                                                return React.createElement('tr', { key: txn.id, className: 'bg-gray-800/40 border-r-2 border-portfolio/30' },
                                                    React.createElement('td', { className: 'px-2 py-2 text-xs text-gray-500' }, '↳ עסקה'),
                                                    React.createElement('td', { className: 'px-2 py-2 text-xs text-gray-500' }, txn.date),
                                                    React.createElement('td', { className: 'px-2 py-2 text-xs text-gray-400' }, txn.shares),
                                                    React.createElement('td', { className: 'px-2 py-2 text-xs text-gray-500' }, formatMoney(txn.price * txnRateAtPurchase)),
                                                    React.createElement('td', { className: 'px-2 py-2 text-xs text-gray-500' }, '-'),
                                                    React.createElement('td', { className: 'px-2 py-2 text-xs text-gray-500' }, '-'),
                                                    React.createElement('td', { className: 'px-2 py-2 text-xs text-gray-500' }, '-'),
                                                    React.createElement('td', { className: 'px-2 py-2 text-xs text-gray-500' }, '-'),
                                                    React.createElement('td', { className: 'px-2 py-2 text-xs font-bold text-gray-300' }, formatMoney(txnValue)),
                                                    React.createElement('td', { className: 'px-2 py-2 text-xs text-gray-500' }, '-'),
                                                    React.createElement('td', { className: 'px-2 py-2 text-xs' },
                                                        React.createElement('span', { className: txnProfit >= 0 ? 'text-green-400' : 'text-red-400' }, (txnProfit >= 0 ? '+' : '') + formatMoney(txnProfit))
                                                    ),
                                                    React.createElement('td', { className: 'px-2 py-2 text-center' },
                                                        stats.transactions.length > 1 ?
                                                            React.createElement('button', { onClick: () => removeTransaction(pos.id, txn.id), className: 'text-xs text-gray-500 hover:text-red-400', title: 'מחק עסקה' }, '✕')
                                                        : null
                                                    )
                                                );
                                            }),
                                            // Expanded dividends rows
                                            isExpanded && (pos.dividends || []).length > 0 && (pos.dividends || []).map(div =>
                                                React.createElement('tr', { key: div.id, className: 'bg-emerald-900/10 border-r-2 border-emerald-500/30' },
                                                    React.createElement('td', { className: 'px-2 py-2 text-xs text-emerald-500', colSpan: 3 }, '💰 דיבידנד ' + div.date),
                                                    React.createElement('td', { className: 'px-2 py-2 text-xs text-emerald-400', colSpan: 2 }, div.amountPerShare ? ('$' + div.amountPerShare.toFixed(4) + '/share') : ('$' + (div.amount || 0).toFixed(2))),
                                                    React.createElement('td', { className: 'px-2 py-2 text-xs text-emerald-400 font-medium', colSpan: 5 }, '+' + formatMoney((div.totalAmount || div.amount || 0) * rateNow)),
                                                    React.createElement('td', { className: 'px-2 py-2' }, ''),
                                                    React.createElement('td', { className: 'px-2 py-2 text-center' },
                                                        React.createElement('button', { onClick: () => removeDividend(pos.id, div.id), className: 'text-xs text-gray-500 hover:text-red-400' }, '✕')
                                                    )
                                                )
                                            )
                                        );
                                    })}

                                    {/* Totals Row */}
                                    {(() => {
                                        const rateNow = currency === 'ILS' ? exchangeRate : 1;
                                        let totalDailyChange = 0;
                                        let totalValue = currency === 'ILS' ? cash * exchangeRate : cash;
                                        let totalProfit = 0;
                                        let totalCost = 0;

                                        positions.forEach(pos => {
                                            const stats = getPositionStats(pos);
                                            const rateAtPurchase = currency === 'ILS' ? getRateAtDate(stats.earliestDate, exchangeRate) : 1;
                                            const cost = stats.totalCost * rateAtPurchase;
                                            const value = stats.totalShares * pos.currentPrice * rateNow;
                                            totalValue += value;
                                            totalCost += cost;
                                            totalProfit += (value - cost);
                                            if (pos.dailyChange !== undefined && pos.dailyChange !== null) {
                                                totalDailyChange += pos.dailyChange * stats.totalShares * rateNow;
                                            }
                                        });

                                        return React.createElement('tr', { className: 'totals-row font-bold' },
                                            React.createElement('td', { className: 'px-2 py-3 text-white text-base' }, '📊 סה\"כ'),
                                            React.createElement('td', { className: 'px-2 py-3' }, ''),
                                            React.createElement('td', { className: 'px-2 py-3' }, ''),
                                            React.createElement('td', { className: 'px-2 py-3' }, ''),
                                            React.createElement('td', { className: 'px-2 py-3' }, ''),
                                            React.createElement('td', { className: 'px-2 py-3' },
                                                React.createElement('div', { className: `flex flex-col ${totalDailyChange >= 0 ? 'text-green-400' : 'text-red-400'}`, dir: 'ltr' },
                                                    React.createElement('span', { className: 'font-bold text-right' }, (totalDailyChange >= 0 ? '+' : '') + formatMoney(totalDailyChange)),
                                                    React.createElement('span', { className: 'text-xs text-right' }, totalValue - (currency === 'ILS' ? cash * exchangeRate : cash) > 0 ? (totalDailyChange >= 0 ? '+' : '') + ((totalDailyChange / (totalValue - (currency === 'ILS' ? cash * exchangeRate : cash) - totalDailyChange)) * 100).toFixed(2) + '%' : '')
                                                )
                                            ),
                                            React.createElement('td', { className: 'px-2 py-3' }, ''),
                                            React.createElement('td', { className: 'px-2 py-3' }, ''),
                                            React.createElement('td', { className: 'px-2 py-3 text-white' }, formatMoney(totalValue)),
                                            React.createElement('td', { className: 'px-2 py-3 text-gray-300' }, '100%'),
                                            React.createElement('td', { className: 'px-2 py-3' },
                                                React.createElement('div', { className: `flex flex-col ${totalProfit >= 0 ? 'text-green-400' : 'text-red-400'}` },
                                                    React.createElement('span', { className: 'font-bold' }, (totalProfit >= 0 ? '+' : '') + formatMoney(totalProfit)),
                                                    React.createElement('span', { className: 'text-xs' }, totalCost > 0 ? (totalProfit >= 0 ? '+' : '') + ((totalProfit / totalCost) * 100).toFixed(2) + '%' : '')
                                                )
                                            ),
                                            React.createElement('td', { className: 'px-2 py-3' }, '')
                                        );
                                    })()}
                                </tbody>
                            </table>
                        </div>

                        {/* Add New Position Form */}
                        <div className="p-6 bg-gray-900/50 border-t border-gray-800">
                            <h3 className="text-sm font-semibold text-gray-400 mb-4">הוסף נכס חדש</h3>
                            <form onSubmit={handleAddPosition} className="grid grid-cols-1 md:grid-cols-5 gap-4">
                                <div>
                                    <input required type="text" placeholder="סמל (למשל AAPL)" value={newSymbol} onChange={e => setNewSymbol(e.target.value)} className="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-portfolio text-sm" />
                                </div>
                                <div>
                                    <input required type="number" step="any" placeholder="כמות מניות" value={newShares} onChange={e => setNewShares(e.target.value)} className="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-portfolio text-sm" />
                                </div>
                                <div>
                                    <input required type="number" step="any" placeholder={`שער קנייה ב-${currency}`} value={newPrice} onChange={e => setNewPrice(e.target.value)} className="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-portfolio text-sm" />
                                </div>
                                <div>
                                    <input required type="date" value={newDate} onChange={e => setNewDate(e.target.value)} className="w-full bg-gray-800 border border-gray-700 rounded-lg px-4 py-2.5 text-white focus:outline-none focus:border-portfolio text-sm custom-date-input" style={{ colorScheme: 'dark' }} />
                                </div>
                                <div>
                                    <button type="submit" className="w-full bg-portfolio hover:bg-blue-600 text-white font-medium rounded-lg px-4 py-2.5 transition-colors shadow-lg shadow-blue-500/20">
                                        הוסף לתיק
                                    </button>
                                </div>
                            </form>

                            {/* Excel Import */}
                            <div className="mt-4 pt-4 border-t border-gray-700/50 flex items-center gap-4">
                                <label className="cursor-pointer flex items-center gap-2 bg-emerald-600/20 hover:bg-emerald-600/30 text-emerald-400 border border-emerald-500/30 rounded-lg px-4 py-2.5 transition-colors text-sm font-medium">
                                    <span>📥 ייבוא מאקסל</span>
                                    <input
                                        type="file"
                                        accept=".xlsx,.xls,.csv"
                                        onChange={handleExcelImport}
                                        className="hidden"
                                    />
                                </label>
                                <span className="text-xs text-gray-500">העלה קובץ XLSX עם פירוט תנועות (תאריך, סוג פעולה, שם הנייר, כמות, מחיר)</span>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>

</html>
